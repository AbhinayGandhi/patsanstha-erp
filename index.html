<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --navy:#1B2A4A; --navy-light:#28395E; --gold:#C99A2E; --cream:#F7F5F0;
    --green:#2F6F4E; --rust:#B54834; --slate:#33363D; --border:#E3DFD5; --card:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Noto Sans Devanagari', sans-serif; background:var(--cream); color:var(--slate); }
  h1,h2,h3,.brand{ font-family:'Tiro Devanagari Marathi', serif; }
  .shell{ display:flex; min-height:100vh; }
  .sidebar{ width:220px; background:var(--navy); color:#fff; flex-shrink:0; display:flex; flex-direction:column; padding:20px 0; }
  .brand{ display:flex; align-items:center; gap:10px; padding:0 20px 20px 20px; border-bottom:1px solid rgba(255,255,255,.12); margin-bottom:14px; }
  .seal{ width:38px;height:38px;border-radius:50%; background:radial-gradient(circle at 30% 30%, var(--gold), #8f701f); display:flex;align-items:center;justify-content:center; font-weight:700; color:var(--navy); font-size:18px; flex-shrink:0; }
  .brand-text{ font-size:19px; line-height:1.2; }
  .brand-text small{ display:block; font-family:'Noto Sans Devanagari'; font-size:11px; opacity:.65; font-weight:400;}
  nav a{ display:flex; align-items:center; gap:10px; color:rgba(255,255,255,.78); text-decoration:none; padding:11px 20px; font-size:15px; cursor:pointer; border-left:3px solid transparent; }
  nav a:hover{ background:rgba(255,255,255,.06); color:#fff; }
  nav a.active{ background:rgba(255,255,255,.09); color:#fff; border-left-color:var(--gold); font-weight:600;}
  nav a .ic{ width:20px; text-align:center; }
  .main{ flex:1; display:flex; flex-direction:column; min-width:0; }
  .topbar{ background:var(--card); border-bottom:1px solid var(--border); padding:14px 28px; display:flex; align-items:center; justify-content:space-between; }
  .topbar h2{ margin:0; font-size:21px; color:var(--navy); }
  .topbar .meta{ font-size:13px; color:#8a8676; cursor:pointer; }
  .content{ padding:26px 28px; flex:1; }
  .stat-row{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:22px; }
  .stat{ background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px 18px; border-top:3px solid var(--gold); }
  .stat .num{ font-size:26px; font-weight:700; color:var(--navy); font-family:'Tiro Devanagari Marathi'; }
  .stat .lbl{ font-size:13px; color:#8a8676; margin-top:2px;}
  .panel{ background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px; }
  .panel-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
  .panel-head h3{ margin:0; font-size:17px; color:var(--navy); }

<script>
/* =========================================================
   SUPABASE CONFIG
   ========================================================= */
const SUPABASE_URL = 'https://temhjrgowrzigdnvijkl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlbWhqcmdvd3J6aWdkbnZpamtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0Mzk0ODIsImV4cCI6MjA5OTAxNTQ4Mn0.Yv80XtocxepssWTp0mtTTyfdvoNiSwv2ofvGjU6PmxU';

let sbClient = null;
let CONN_STATE = 'checking'; // checking | ok | error
let CONN_ERROR = '';

function setConnUI(state, text){
  const dot = document.getElementById('conn-dot');
  const txt = document.getElementById('conn-text');
  dot.className = 'badge-dot ' + (state==='ok' ? 'conn-ok' : state==='warn' ? 'conn-warn' : 'conn-bad');
  txt.textContent = text;
}

function waitForSupabaseLib(timeoutMs){
  return new Promise((resolve, reject)=>{
    const start = Date.now();
    (function check(){
      if (window.supabase && typeof window.supabase.createClient === 'function') return resolve();
      if (Date.now() - start > timeoutMs) return reject(new Error('Supabase लायब्ररी लोड होऊ शकली नाही (नेट धीमे आहे किंवा ब्लॉक झालंय). पेज रीलोड करून पुन्हा प्रयत्न करा.'));
      setTimeout(check, 150);
    })();
  });
}

async function initSupabase(){
  try {
    await waitForSupabaseLib(15000);
  } catch(e){
    CONN_STATE = 'error'; CONN_ERROR = e.message;
    setConnUI('bad', 'लायब्ररी लोड एरर');
    return;
  }
  try {
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch(e){
    CONN_STATE = 'error'; CONN_ERROR = 'क्लायंट तयार होऊ शकला नाही: ' + e.message;
    setConnUI('bad', 'कनेक्शन एरर');
    return;
  }
  // प्रत्यक्ष हलकी टेस्ट क्वेरी — फक्त 1 रो, कनेक्शन खरंच काम करतंय का ते तपासण्यासाठी
  try {
    const { error, count } = await sbClient.from('branches').select('id', { count:'exact', head:true });
    if (error) {
      // काही preview/sandbox वातावरणात fetch मॉनिटरिंगमुळे postMessage वर
      // "DataCloneError...Headers object could not be cloned" अशी बनावट एरर येते.
      // ही प्रत्यक्ष Supabase एरर नाही — त्यामुळे कनेक्शन बिघडलेलं मानू नये.
      if (/DataCloneError/i.test(error.message || '') || /postMessage/i.test(error.message || '')) {
        CONN_STATE = 'ok';
        setConnUI('ok', 'Supabase जोडलेले ✓ (टीप: प्रिव्ह्यू वातावरणात एक निरुपद्रवी postMessage चेतावणी दिसू शकते)');
        return;
      }
      CONN_STATE = 'error'; CONN_ERROR = error.message;
      setConnUI('bad', 'जोडलं पण एरर: ' + error.message);
      return;
    }
    CONN_STATE = 'ok';
    setConnUI('ok', 'Supabase जोडलेले ✓');
  } catch(e){
    if (/DataCloneError/i.test(e.message || '') || /postMessage/i.test(e.message || '')) {
      CONN_STATE = 'ok';
      setConnUI('ok', 'Supabase जोडलेले ✓ (टीप: प्रिव्ह्यू वातावरणात एक निरुपद्रवी postMessage चेतावणी दिसू शकते)');
      return;
    }
    CONN_STATE = 'error'; CONN_ERROR = 'नेटवर्क एरर: ' + e.message;
    setConnUI('bad', 'नेटवर्क एरर (इंटरनेट तपासा)');
  }
}

function usingMock(){ return CONN_STATE !== 'ok'; }

function incompleteHistoryBanner(rows){

  if (!missing) return '';
  return `<div class="banner warn">⚠ काही जुन्या व्यवहारांना "शिल्लक (नंतर)" नोंदलेली नाही (जुना/मायग्रेट झालेला डेटा) — अशा ओळींमध्ये ती रिकामी किंवा ₹0 दिसू शकते. याचा अर्थ त्या तारखेला शिल्लक शून्य होती असा होत नाही — इतिहास अपूर्ण आहे.</div>`;
}

/* =========================================================
   REFERENCE DATA (branches/schemes — छोट्या, कॅशेबल)
   ========================================================= */
let REF = { branches: [], schemes: [], loaded:false };
async function loadRefData(){
  if (REF.loaded) return;
  if (usingMock()){
    REF.branches = [{id:'b1', name:'मुख्य शाखा'}];
    REF.schemes = [
      {id:'s1', name:'बचत खाते', product_type:'savings'}, {id:'s2', name:'मुदत ठेव', product_type:'fd'},
      {id:'s3', name:'आवर्ती ठेव', product_type:'rd'}, {id:'s4', name:'सभासद कर्ज', product_type:'loan'},
      {id:'s5', name:'पिग्मी', product_type:'pigmy'},
    ];
    REF.loaded = true; return;
  }
  const [{data:branches, error:e1}, {data:schemes, error:e2}] = await Promise.all([
    sbClient.from('branches').select('id,name').order('name'),
    sbClient.from('schemes').select('id,name,product_type').order('name'),
  ]);
  REF.branches = branches || []; REF.schemes = schemes || [];
  REF.loaded = true;
  if (e1 || e2) console.error(e1, e2);
}

   ========================================================= */
async function render(view, param){
  const c = document.getElementById('content');
  c.innerHTML = '<div class="empty">लोड होत आहे...</div>';
  if (view === 'dashboard') return renderDashboard(c);
  if (view === 'members') return renderMembers(c);
  if (view === 'savings') return renderAccountsList(c, ['savings'], 'बचत खाती');
  if (view === 'fd') return renderAccountsList(c, ['fd','rd'], 'मुदत ठेव (FD/RD)');

/* बॅलन्स बेरीज: Supabase/PostgREST डिफॉल्ट रो-लिमिट (साधारण 1000) मुळे मोठ्या डेटासेटवर
   एका क्वेरीत खरी बेरीज मिळत नाही — म्हणून 1000-1000 च्या पानांत सगळा डेटा वाचून बेरीज करतो */
async function fetchAllActiveBalanceSum(){
  let total = 0, from = 0; const chunk = 1000;
  while (true){
    const { data, error } = await sbClient.from('accounts')
      .select('current_balance').eq('status','active').range(from, from + chunk - 1);
    if (error) throw error;
    if (!data || !data.length) break;
    total += data.reduce((s,a)=>s+Number(a.current_balance||0),0);
    if (data.length < chunk) break;
    from += chunk;
  }
  return total;
}

/* सामान्य pagination helper — Reports साठी संपूर्ण टेबल (1000 row limit टाळून) वाचायला */
async function fetchAllRows(table, selectStr, applyFilters){
  let out = [], from = 0; const chunk = 1000;
  while (true){
    let q = sbClient.from(table).select(selectStr).range(from, from + chunk - 1);
    if (applyFilters) q = applyFilters(q);
    const { data, error } = await q;
    if (error) throw error;
    if (!data || !data.length) break;
    out = out.concat(data);
    if (data.length < chunk) break;
    from += chunk;
  }
  return out;
}

        q = q.order('account_no',{ascending:true});

        q = q.order('created_at',{ascending:false}).order('id',{ascending:false});
      }
      q = q.range(accountPage*ACC_PAGE_SIZE, accountPage*ACC_PAGE_SIZE + ACC_PAGE_SIZE - 1);
      const { data, error, count } = await q;
      if (error){ c.innerHTML = errBanner('खाती आणताना त्रुटी: ' + error.message); return; }
      list = data || []; totalCount = count || 0;
    } catch(e){ c.innerHTML = errBanner(e.message); return; }
  }
  c.innerHTML = `
    ${usingMock() ? connWarningBanner() : ''}
    <div class="panel">
      <div class="panel-head">
        <h3>${label} (एकूण ${totalCount})</h3>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">

  if (usingMock()){ alert('Supabase जोडलेले नाही — डेमो मोडमध्ये जतन होणार नाही.'); return; }
  const btn = document.getElementById('save-acc-btn'); btn.disabled = true; btn.textContent = 'जतन होत आहे...';
  const ptype = document.getElementById('f-ptype').value;
  const tenure = Number(document.getElementById('f-tenure').value || 0);

    member_id: memberId, scheme_id: schemeId || null, branch_id: branchId || null,
    product_type: ptype,

    interest_rate: Number(document.getElementById('f-rate').value || 0),

  };
  if (ptype === 'loan' && tenure > 0){ row.tenure_months = tenure; }
  const { data: inserted, error } = await sbClient.from('accounts').insert(row).select('id,open_date').single();
  if (error){ alert('जतन करताना त्रुटी: ' + error.message); btn.disabled=false; btn.textContent='जतन करा'; return; }
  if (ptype === 'loan' && tenure > 0){
    try {
      const schedule = buildLoanSchedule(inserted.id, amt, row.interest_rate, tenure, inserted.open_date);

/* शुद्ध गणिती अ‍ॅम्पर्टायझेशन शेड्यूल (reducing balance) — कुठलाही DB-साठी रो-फॉरमॅट न ठरवता,
   महिना-निहाय मुद्दल/व्याज विभागणी परत करतं. buildLoanSchedule (नवीन कर्ज नोंदणी) आणि
   व्याज वसुली अहवाल — दोन्हीकडे हाच वापरला जातो, जेणेकरून लॉजिक एकाच ठिकाणी राहील. */
function generateAmortizationRows(principal, annualRatePct, months, startDateStr){
  const r = (Number(annualRatePct)||0) / 12 / 100;
  const n = Math.round(months);
  let emi;
  if (n<=0) return [];
  if (r === 0){ emi = principal / n; }
  else { emi = principal * r * Math.pow(1+r, n) / (Math.pow(1+r, n) - 1); }
  const start = new Date(startDateStr);
  let balance = principal;
  const rows = [];
  for (let i = 1; i <= n; i++){
    const interest = balance * r;
    let principalComp = emi - interest;
    if (i === n){ principalComp = balance; } // शेवटच्या हप्त्यात राउंडिंग फरक शिल्लक रकमेत जुळवतो
    const due = new Date(start); due.setMonth(due.getMonth() + i);
    rows.push({
      installment_no: i,
      due_date: due.toISOString().slice(0,10),
      principal: Math.round(principalComp * 100) / 100,
      interest: Math.round(interest * 100) / 100
    });
    balance -= principalComp;
  }
  return rows;
}
/* महिना पद्धतीने EMI हप्ता-वेळापत्रक (reducing balance) तयार करते — loan_installments टेबलमध्ये जतन करण्यासाठी */
function buildLoanSchedule(accountId, principal, annualRatePct, months, startDateStr){
  return generateAmortizationRows(principal, annualRatePct, months, startDateStr).map(x=>({
    account_id: accountId, installment_no: x.installment_no, due_date: x.due_date,
    principal_due: x.principal, interest_due: x.interest,
    principal_paid: 0, interest_paid: 0, penal_paid: 0, status: 'देय'
  }));
}

async function saveTxn(acc){
  if (usingMock()){ alert('Supabase जोडलेले नाही — डेमो मोडमध्ये जतन होणार नाही.'); return; }
  const cd = document.getElementById('tx-type').value;
  const amt = Number(document.getElementById('tx-amt').value || 0);
  const date = document.getElementById('tx-date').value;
  const narr = document.getElementById('tx-narr').value;
  if (!amt || amt <= 0){ alert('योग्य रक्कम टाका'); return; }
  const btn = document.getElementById('save-txn-btn'); btn.disabled = true; btn.textContent = 'जतन होत आहे...';

  // process_transaction() हे Postgres function व्यवहार-नोंद + शिल्लक-अपडेट एकाच अणुरूप (atomic)
  // पावलात करतं (row लॉक करून), त्यामुळे दोन व्यवहार एकाच वेळी आले तरी बॅलन्स चुकत नाही
  const { data: newBalance, error: rpcErr } = await sbClient.rpc('process_transaction', {
    p_account_id: acc.id,
    p_cd_flag: cd,
    p_amount: amt,
    p_txn_date: date || new Date().toISOString().slice(0,10),
    p_narration: narr || null
  });
  if (rpcErr){ alert('व्यवहार जतन करताना त्रुटी: ' + rpcErr.message); btn.disabled=false; btn.textContent='जतन करा'; return; }

  // कर्ज खात्यावरचा भरणा असेल (काढणे/D = हप्ता भरणा असं गृहीत धरलं आहे) तर तो loan_installments मध्येही वाटून द्या
  if (acc.product_type === 'loan' && cd === 'D'){
    const { error: instErr } = await sbClient.rpc('process_loan_installment_payment', {
      p_account_id: acc.id, p_amount: amt, p_payment_date: date || new Date().toISOString().slice(0,10)
    });
    if (instErr){ alert('खाते-शिल्लक अपडेट झाली, पण हप्ता-वेळापत्रकात वाटप करताना त्रुटी: ' + instErr.message); }
  }

  closeModal();
  if (typeof window.__txnOnSaved === 'function'){
    const cb = window.__txnOnSaved; window.__txnOnSaved = null;
    cb();
  } else {
    render(document.querySelector('#nav a.active').dataset.view);
  }
}

let __dtCounter = 0;
function dataTable(columns, rows, footerRow){
  const tid = 'dt' + (__dtCounter++);
  const thead = columns.map(col=>`<th>${col.label}</th>`).join('');
  const tbody = rows.length ? rows.map(r=>`<tr>${columns.map(col=>`<td${col.num?' style="text-align:right"':''}>${(r[col.key]!==undefined&&r[col.key]!==null)?r[col.key]:''}</td>`).join('')}</tr>`).join('')
    : `<tr><td colspan="${columns.length}" class="empty"><div class="big">▤</div>डेटा नाही</td></tr>`;
  const tfoot = footerRow ? `<tfoot><tr>${columns.map(col=>`<td${col.num?' style="text-align:right"':''}>${footerRow[col.key]!==undefined?footerRow[col.key]:''}</td>`).join('')}</tr></tfoot>` : '';
  const toolbar = rows.length ? `<div class="dt-toolbar" style="display:flex;gap:8px;margin-bottom:8px;align-items:center;">
    <input type="text" placeholder="या यादीत शोधा..." oninput="filterDataTable('${tid}', this.value)" style="max-width:260px;">
    <button class="btn ghost small" onclick="exportDataTableCSV('${tid}')">⬇ CSV डाउनलोड</button>
  </div>` : '';
  return `${toolbar}<div class="table-scroll"><table id="${tid}"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody>${tfoot}</table></div>`;
}
function filterDataTable(tid, term){
  const t = document.getElementById(tid); if (!t) return;
  const q = term.trim().toLowerCase();
  t.querySelectorAll('tbody tr').forEach(tr=>{
    tr.style.display = !q || tr.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}
function exportDataTableCSV(tid){
  const t = document.getElementById(tid); if (!t) return;
  const rowsOut = [];
  const heads = [...t.querySelectorAll('thead th')].map(th=>'"'+th.textContent.replace(/"/g,'""')+'"');
  rowsOut.push(heads.join(','));
  t.querySelectorAll('tbody tr').forEach(tr=>{
    if (tr.style.display === 'none') return;
    const cells = [...tr.querySelectorAll('td')].map(td=>'"'+td.textContent.replace(/"/g,'""')+'"');
    if (cells.length) rowsOut.push(cells.join(','));
  });
  const csv = '\uFEFF' + rowsOut.join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'report-' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

async function renderMissingNomineeReport(c){
  c.innerHTML = '<div class="empty">लोड होत आहे...</div>';
  try {
    const [accRows, nomRows] = await Promise.all([
      fetchAllRows('accounts', 'id,account_no,product_type,open_date,current_balance,members!member_id(name),branches(name)',
        q=>q.eq('status','active').in('product_type',['savings','fd','rd','pigmy'])),
      fetchAllRows('nominees', 'account_id')
    ]);
    const hasNominee = new Set(nomRows.map(n=>n.account_id));
    const missing = accRows.filter(r=>!hasNominee.has(r.id));
    const total = missing.reduce((s,r)=>s+Number(r.current_balance||0),0);
    const trows = missing.map(r=>({
      no:r.account_no, name:memberName(r), branch:branchName(r), type:PRODUCT_TAG[r.product_type]||r.product_type,
      odate:r.open_date||'', bal:fmtMoney(Number(r.current_balance||0))

      trows, {no:`एकूण: ${missing.length}`, bal:fmtMoney(total)}
    );
    const note = `<div class="banner warn" style="margin-bottom:10px;">⚠ एकूण ${accRows.length} सक्रिय खात्यांपैकी ${missing.length} (${Math.round(missing.length/accRows.length*100)}%) खात्यांना नॉमिनी नोंदलेला नाही.</div>`;
    c.innerHTML = reportShell('नामनिर्देशन (Nominee) नसलेली खाती', `एकूण ${missing.length} खाती`, '', note+body);
  } catch(e){ c.innerHTML = errBanner(e.message); }
}

let repLedgerTimer = null;
function reportLedgerSearch(){
  clearTimeout(repLedgerTimer);
  const term = document.getElementById('rep-ledger-search').value.trim();
  const box = document.getElementById('rep-ledger-results');
  if (!term || term.length < 2){ box.innerHTML = ''; return; }
  box.innerHTML = '<div class="empty">शोधत आहे...</div>';
  repLedgerTimer = setTimeout(async ()=>{
    try {
      const safeTerm = term.replace(/[,()]/g, '');
      const { data, error } = await sbClient.from('accounts')
        .select('id,account_no,current_balance,status,members!member_id(name)')
        .eq('product_type','savings').ilike('account_no', `%${safeTerm}%`).limit(20);
      let results = data || [];
      if (!results.length){
        const { data: matchedMembers } = await sbClient.from('members').select('id').ilike('name', `%${safeTerm}%`).limit(50);
        const memberIds = (matchedMembers||[]).map(m=>m.id);
        if (memberIds.length){
          const { data: byMember } = await sbClient.from('accounts')
            .select('id,account_no,current_balance,status,members!member_id(name)')
            .eq('product_type','savings').in('member_id', memberIds).limit(20);
          results = byMember || [];
        }
      }
      if (error && !results.length){ box.innerHTML = errBanner('शोधताना त्रुटी: ' + error.message); return; }
      box.innerHTML = results.length ? `
        <table><tbody>
          ${results.map(a=>`
            <tr>
              <td>${a.account_no}</td>
              <td>${memberName(a)}</td>
              <td>${fmtMoney(a.current_balance)}</td>
              <td>${a.status||''}</td>
              <td><button class="btn ghost small" onclick="renderSavingsStatement('${a.id}')">स्टेटमेंट बघा</button></td>

        </tbody></table>
      ` : '<p class="empty">काही सापडले नाही</p>';
    } catch(e){ box.innerHTML = errBanner(e.message); }
  }, 300);
}

/* ---------- थकबाकी वयोगट विश्लेषण / NPA वर्गीकरण (अंदाजे, EMI गणितावर आधारित) ---------- */
async function renderNpaAgeingReport(c){
  c.innerHTML = '<div class="empty">लोड होत आहे...</div>';
  try {
    const rows = await fetchAllRows('accounts',
      'account_no,opening_balance,current_balance,interest_rate,open_date,tenure_months,members!member_id(name),branches(name),loan_details(installment_amount,repayment_period_months,first_installment_date,is_npa)',
      q=>q.eq('product_type','loan').eq('status','active').not('open_date','is',null));
    const buckets = {'मानक (० दिवस)':[], 'सब-स्टँडर्ड (१-९०)':[], 'डाउटफुल (९१-१८०)':[], 'डाउटफुल-२ (१८१-३६५)':[], 'लॉस (३६५+)':[]};
    rows.forEach(r=>{
      const ld = r.loan_details || null;
      const P = Number(r.opening_balance||0);
      const n = Number(r.tenure_months || (ld && ld.repayment_period_months) || 0);
      if (P<=0 || n<=0) return;
      const emi = (ld && ld.installment_amount!=null) ? Number(ld.installment_amount) : calcEMI(P, r.interest_rate, n);
      const startDate = (ld && ld.first_installment_date) || r.open_date;
      const k = Math.min(monthsElapsed(startDate), n);
      const expectedBal = calcOutstandingAfter(P, r.interest_rate, n, k);
      const actualBal = Number(r.current_balance||0);
      const overdueAmt = actualBal - expectedBal;
      if (overdueAmt <= 1) return;
      const overdueInst = emi>0 ? Math.round(overdueAmt/emi) : 0;
      const days = overdueInst * 30;
      const isNpa = !!(ld && ld.is_npa);
      const item = {no:r.account_no, name:memberName(r), branch:branchName(r), bal:fmtMoney(actualBal), overdue:fmtMoney(overdueAmt), days, npa: isNpa?'<span class="tag loan">NPA</span>':''};
      if (days<=0) buckets['मानक (० दिवस)'].push(item);
      else if (days<=90) buckets['सब-स्टँडर्ड (१-९०)'].push(item);
      else if (days<=180) buckets['डाउटफुल (९१-१८०)'].push(item);
      else if (days<=365) buckets['डाउटफुल-२ (१८१-३६५)'].push(item);
      else buckets['लॉस (३६५+)'].push(item);
    });
    let html = `<div class="banner warn" style="margin-bottom:10px;">⚠ EMI शक्य तिथे loan_details मधील खऱ्या हप्ता-रकमेवरून घेतलेला आहे; तो नसल्यास अंदाजे कॅल्क्युलेट केलेला आहे. वयोगट-वर्गीकरण अजूनही थकीत-हप्ते संख्येवरून अंदाजे काढलेलं आहे — अधिकृत NPA वर्गीकरणासाठी अंतिम पडताळणी करावी.</div>`;
    html += `<table style="margin-bottom:16px;"><thead><tr><th>वर्ग</th><th>कर्ज संख्या</th><th>एकूण थकीत रक्कम</th></tr></thead><tbody>`;
    Object.entries(buckets).forEach(([k,v])=>{
      const tot = v.reduce((s,x)=>s+Number((x.overdue||'0').replace(/[₹,]/g,'')),0);
      html += `<tr><td>${k}</td><td>${v.length}</td><td>${fmtMoney(tot)}</td></tr>`;
    });
    html += `</tbody></table>`;
    Object.entries(buckets).forEach(([k,v])=>{
      if (v.length===0) return;
      html += `<h4 style="margin:14px 0 6px;">${k} (${v.length})</h4>`;
      html += dataTable([{key:'no',label:'कर्ज क्र'},{key:'name',label:'सभासद'},{key:'branch',label:'शाखा'},{key:'bal',label:'शिल्लक',num:true},{key:'overdue',label:'थकीत रक्कम (अंदाजे)',num:true},{key:'days',label:'अंदाजे दिवस थकीत'},{key:'npa',label:'स्थिती'}], v);
    });
    c.innerHTML = reportShell('थकबाकी वयोगट विश्लेषण / NPA वर्गीकरण (अंदाजे)', todayStr()+' पर्यंत', '', html);
  } catch(e){ c.innerHTML = errBanner(e.message); }
}

/* ---------- कर्ज थकीत हप्ते अहवाल (EMI कॅल्क्युलेशन आधारित) ---------- */
function calcEMI(P, annualRatePct, n){
  const r = (Number(annualRatePct)||0)/12/100;
  if (n<=0) return 0;
  if (r===0) return P/n;
  const pow = Math.pow(1+r, n);
  return P*r*pow/(pow-1);
}
function calcOutstandingAfter(P, annualRatePct, n, k){
  const r = (Number(annualRatePct)||0)/12/100;
  if (k>=n) return 0;
  if (r===0) return P*(1-(k/n));
  const pow = Math.pow(1+r, n), powK = Math.pow(1+r, k);
  return P*(pow-powK)/(pow-1);
}
function monthsElapsed(openDate){
  const o = new Date(openDate), t = new Date();
  let m = (t.getFullYear()-o.getFullYear())*12 + (t.getMonth()-o.getMonth());
  if (t.getDate() < o.getDate()) m -= 1;
  return Math.max(0, m);
}

  try {

      q=>q.eq('product_type','loan').eq('status','active').not('open_date','is',null));
    const calc = rows.map(r=>{
      const ld = r.loan_details || null;
      const P = Number(r.opening_balance||0);
      const n = Number(r.tenure_months || (ld && ld.repayment_period_months) || 0);
      if (n<=0) return null; // मुदत कुठूनच मिळाली नाही तर कॅल्क्युलेट करता येत नाही
      // खरा EMI loan_details मधून; तो नसेल तरच अंदाजे calcEMI() वापरतो
      const emi = (ld && ld.installment_amount!=null) ? Number(ld.installment_amount) : calcEMI(P, r.interest_rate, n);
      const startDate = (ld && ld.first_installment_date) || r.open_date;

      const isNpa = !!(ld && ld.is_npa);
      return {r, emi, k, expectedBal, actualBal, overdueAmt, overdueInst, isNpa};

async function renderInterestCollectionReport(c, dateFrom, dateTo){
  c.innerHTML = '<div class="empty">लोड होत आहे...</div>';
  try {
    const rows = await fetchAllRows('accounts',
      'account_no,opening_balance,interest_rate,open_date,tenure_months,members!member_id(name),branches(name),loan_details(installment_amount,repayment_period_months,first_installment_date)',
      q=>q.eq('product_type','loan').not('open_date','is',null));

    const trows = [];
    let totalP = 0, totalI = 0;
    for (const r of rows){
      const ld = r.loan_details || null;
      const n = Number(r.tenure_months || (ld && ld.repayment_period_months) || 0);
      if (n<=0) continue;
      const P = Number(r.opening_balance||0);
      const startDate = (ld && ld.first_installment_date) || r.open_date;

      const inRange = schedule.filter(x=>{ const d = new Date(x.due_date); return d>=from && d<=to; });
      if (!inRange.length) continue;
      const pSum = inRange.reduce((s,x)=>s+x.principal,0);

      totalP += pSum; totalI += iSum;
      trows.push({
        no:r.account_no, name:memberName(r), branch:branchName(r), inst:inRange.length,
        p:fmtMoney(pSum), i:fmtMoney(iSum), tot:fmtMoney(pSum+iSum)
      });

      `renderInterestCollectionReport(document.getElementById('content'), document.getElementById('ic-from').value, document.getElementById('ic-to').value)`);

/* ---------- ताळेबंद — Chart of Accounts (accounting_heads + journal_entries) आधारित ---------- */
async function renderBalanceSheetGL(c, asOfDate){
  c.innerHTML = '<div class="empty">लोड होत आहे...</div>';
  try {
    let heads, usingView = true;
    if (asOfDate) {
      const { data, error } = await sbClient.rpc('gl_trial_balance_asof', { asof: asOfDate });
      if (error) throw error;
      heads = data.map(h=>({...h, stored_current_balance: null}));
    } else {
      try {
        heads = await fetchAllRows('gl_trial_balance','id,gl_code,name,account_type,category,opening_balance,stored_current_balance,computed_balance');
      } catch(viewErr){
        usingView = false;
        const fallback = await fetchAllRows('gl_accounts','gl_code,name,account_type,category,opening_balance,current_balance', q=>q.eq('is_active',true));
        heads = fallback.map(h=>({...h, computed_balance: Number(h.current_balance||0), stored_current_balance: Number(h.current_balance||0)}));
      }
    }
    // सुरक्षा-जाळी: gl_trial_balance_asof() (किंवा इतर स्रोत) ने account_type दिलेला नसेल / चुकीचा असेल,
    // तर gl_accounts मास्टरमधून gl_code प्रमाणे account_type आणून भरून घ्या — जेणेकरून
    // मालमत्ता/दायित्व/भांडवल/उत्पन्न/खर्च वर्गीकरण नेहमी बरोबर होईल.
    const validTypes = ['asset','liability','equity','income','expense'];
    const needsLookup = heads.some(h => !validTypes.includes(h.account_type));
    if (needsLookup) {
      const master = await fetchAllRows('gl_accounts','gl_code,account_type');
      const typeByCode = {};
      master.forEach(m => { typeByCode[m.gl_code] = m.account_type; });
      heads = heads.map(h => validTypes.includes(h.account_type) ? h : ({...h, account_type: typeByCode[h.gl_code] || h.account_type}));
    }
    const groups = { asset:[], liability:[], equity:[], income:[], expense:[] };
    const unknownType = [];
    const mismatches = [];
    heads.forEach(h=>{
      const bal = Number(h.computed_balance||0);
      const stored = Number(h.stored_current_balance||0);
      if (!asOfDate && Math.round(bal*100) !== Math.round(stored*100)) mismatches.push({name:`${h.gl_code} — ${h.name}`, computed:fmtMoney(bal), stored:fmtMoney(stored), diff:fmtMoney(bal-stored)});
      if (groups[h.account_type]) groups[h.account_type].push({name:`${h.gl_code} — ${h.name}`, cat:h.category||'', bal});
      else unknownType.push({name:`${h.gl_code} — ${h.name}`, cat:h.category||'', bal, type:h.account_type||'(रिकामे)'});
    });
    const sumOf = arr => arr.reduce((s,x)=>s+x.bal,0);
    const totalAssets = sumOf(groups.asset), totalLiab = sumOf(groups.liability), totalEquity = sumOf(groups.equity);
    const totalIncome = sumOf(groups.income), totalExpense = sumOf(groups.expense);
    const netProfit = totalIncome - totalExpense;
    // gl_accounts.category चा अर्थ: B=बँक, D=ठेव, L=कर्ज, G=सर्वसाधारण (उर्वरित सगळं — निधी/उत्पन्न/खर्च/चालू देणी-येणी)
    const CATEGORY_LABEL = { B:'बँक (Bank)', D:'ठेव (Deposit)', L:'कर्ज (Loan)', G:'सर्वसाधारण (General)' };
    const categoryLabel = cat => CATEGORY_LABEL[cat] || (cat ? cat : '(अवर्गीकृत)');
    // प्रत्येक विभागातील (मालमत्ता/दायित्व/...) खाती category प्रमाणे उप-गटात दाखवतो, प्रत्येक उप-गटाचं उप-टोटल सह
    const grpTable = (arr, label) => {
      const byCat = {};
      arr.forEach(x=>{ const k = x.cat || ''; (byCat[k] = byCat[k]||[]).push(x); });
      const order = ['B','D','L','G',''];
      const catKeys = Object.keys(byCat).sort((a,b)=> order.indexOf(a) - order.indexOf(b));
      let out = '';
      catKeys.forEach(k=>{
        const rows = byCat[k];
        const subtotal = rows.reduce((s,x)=>s+x.bal,0);
        out += `<div style="margin-top:12px;margin-bottom:4px;font-weight:600;color:#8a8676;font-size:12.5px;">${categoryLabel(k)} — ${rows.length} खाती</div>`;
        out += dataTable([{key:'name',label},{key:'bal',label:'शिल्लक',num:true}],
          rows.map(x=>({name:x.name, bal:fmtMoney(x.bal)})), {name:'उप-बेरीज', bal:fmtMoney(subtotal)});
      });
      out += `<div style="margin-top:8px;font-weight:700;text-align:right;">विभाग एकूण: ${fmtMoney(sumOf(arr))}</div>`;
      return out;
    };
    const unknownBlock = unknownType.length ? `
      <div class="banner warn" style="margin-top:14px;">⚠ खालील ${unknownType.length} GL खात्यांना कुठलाही ओळखीचा account_type नाहीये — ती वरच्या कुठल्याही बेरजेत मोजलेली नाहीत:</div>
      ${dataTable([{key:'name',label:'GL खातं'},{key:'type',label:'account_type'},{key:'bal',label:'शिल्लक',num:true}], unknownType)}` : '';
    const mismatchBlock = asOfDate ? '' : (usingView ? (mismatches.length ? `
      <div class="banner warn" style="margin-top:14px;">⚠ खालील ${mismatches.length} GL खात्यांत journal_entries वरून काढलेली शिल्लक आणि आधीची साठवलेली current_balance जुळत नाहीये — फरक तपासून घ्या:</div>
      ${dataTable([{key:'name',label:'GL खातं'},{key:'computed',label:'Journal-आधारित',num:true},{key:'stored',label:'जुनी साठवलेली',num:true},{key:'diff',label:'फरक',num:true}], mismatches)}`
      : `<div class="banner" style="margin-top:14px;background:#eafaf1;border-color:#2ecc71;">✓ सर्व ${heads.length} GL खात्यांची journal_entries-आधारित शिल्लक आणि जुनी साठवलेली current_balance पूर्ण जुळते.</div>`)
      : `<div class="banner warn">⚠ gl_trial_balance व्ह्यू अजून तयार नाही — सध्या फक्त gl_accounts.current_balance (जुनी पद्धत) वापरलेली आहे, journal_entries पडताळलेली नाहीत.</div>`);
    const dateControl = `<input type="date" id="gl-asof" value="${asOfDate||''}" style="width:auto;">
      <button class="btn ghost small" onclick="renderBalanceSheetGL(document.getElementById('content'), document.getElementById('gl-asof').value)">या तारखेपर्यंत दाखवा</button>
      ${asOfDate ? `<button class="btn ghost small" onclick="renderBalanceSheetGL(document.getElementById('content'))">आत्तापर्यंतचा (लाईव्ह) दाखवा</button>` : ''}`;
    const body = `
      <div class="banner warn">${asOfDate ? `✓ हे आकडे <b>${asOfDate}</b> पर्यंतच्याच journal_entries वरून काढलेले आहेत — अधिकृत ताळेबंदाशी थेट तुलना करण्यासाठी.` : (usingView ? '✓ हे आकडे आता <code>journal_entries</code> (5.75 लाख+ खऱ्या नोंदी) वरून प्रत्येक GL खात्याची शिल्लक अचूक काढून दाखवलेले आहेत.' : '')} प्रत्येक विभागातील खाती <b>बँक / ठेव / कर्ज / सर्वसाधारण</b> या उप-गटांत विभागलेली आहेत.</div>
      <div class="panel-head"><h3 style="font-size:15px;">मालमत्ता (Assets)</h3></div>
      ${grpTable(groups.asset,'GL खातं')}
      <div class="panel-head" style="margin-top:14px;"><h3 style="font-size:15px;">दायित्व (Liabilities)</h3></div>
      ${grpTable(groups.liability,'GL खातं')}
      <div class="panel-head" style="margin-top:14px;"><h3 style="font-size:15px;">भांडवल (Equity — शेअर्स/राखीव निधी)</h3></div>
      ${grpTable(groups.equity,'GL खातं')}
      <div class="panel-head" style="margin-top:14px;"><h3 style="font-size:15px;">उत्पन्न (Income)</h3></div>
      ${grpTable(groups.income,'GL खातं')}
      <div class="panel-head" style="margin-top:14px;"><h3 style="font-size:15px;">खर्च (Expense)</h3></div>
      ${grpTable(groups.expense,'GL खातं')}
      ${unknownBlock}
      ${mismatchBlock}
      <div class="stat-row" style="margin-top:16px;">
        <div class="stat" style="border-top-color:var(--green)"><div class="num">${fmtMoney(totalAssets)}</div><div class="lbl">एकूण मालमत्ता</div></div>
        <div class="stat" style="border-top-color:var(--rust)"><div class="num">${fmtMoney(totalLiab+totalEquity)}</div><div class="lbl">एकूण दायित्व+भांडवल</div></div>
        <div class="stat"><div class="num">${fmtMoney(netProfit)}</div><div class="lbl">निव्वळ नफा (उत्पन्न-खर्च)</div></div>
        <div class="stat"><div class="num">${fmtMoney(totalAssets-(totalLiab+totalEquity+netProfit))}</div><div class="lbl">फरक (जुळणी तपासा)</div></div>
      </div>
    `;
    c.innerHTML = reportShell('ताळेबंद (Ledger / Chart of Accounts आधारित)', asOfDate ? `${asOfDate} पर्यंत` : (usingView ? `journal_entries वरून, ${todayStr()}` : `gl_accounts वरून (जुनी पद्धत), ${todayStr()}`), dateControl, body);
  } catch(e){ c.innerHTML = errBanner(e.message); }
}

/* ---------- भाग भांडवल (Share Capital) एकूण बेरीज — share_transactions वरून ----------
   renderShareCapitalRegister() मधलं तेच issue/transfer लॉजिक इथे पुन्हा वापरलं आहे,
   जेणेकरून दोन्ही ठिकाणी (नोंदवही + ताळेबंद) आकडे नेहमी सारखेच राहतील (एकाच जागी मेंटेन). */
async function fetchShareCapitalTotals(){
  const rows = await fetchAllRows('share_transactions', 'member_id,transfer_to_member_id,no_of_shares,share_value,txn_type');
  const agg = {};
  const ensure = id => { if(!agg[id]) agg[id] = {shares:0, value:0}; return agg[id]; };
  rows.forEach(r=>{
    const shares = Number(r.no_of_shares||0), value = shares * Number(r.share_value||0);
    if (r.txn_type === 'issue'){
      const a = ensure(r.member_id); a.shares += shares; a.value += value;
    } else { // transfer व इतर प्रकार — मूळ खात्यातून वजा व लाभार्थ्याकडे जमा
      const from = ensure(r.member_id); from.shares -= shares; from.value -= value;
      if (r.transfer_to_member_id){ const to = ensure(r.transfer_to_member_id); to.shares += shares; to.value += value; }
    }
  });
  let totalShares = 0, totalValue = 0;
  Object.values(agg).forEach(a=>{ if (a.shares > 0){ totalShares += a.shares; totalValue += a.value; } });
  return { totalShares, totalValue };
}

    const accounts = await fetchAllRows('accounts','product_type,current_balance,status', q=>q.eq('status','active'));
    const loanTotal = accounts.filter(a=>a.product_type==='loan').reduce((s,r)=>s+Number(r.current_balance||0),0);
    const savingsTotal = accounts.filter(a=>a.product_type==='savings').reduce((s,r)=>s+Number(r.current_balance||0),0);
    const depositTotal = accounts.filter(a=>['fd','rd'].includes(a.product_type)).reduce((s,r)=>s+Number(r.current_balance||0),0);

      <div class="panel-head" style="margin-top:14px;"><h3 style="font-size:15px;">दायित्व (Liabilities)</h3></div>
      ${dataTable([{key:'h',label:'बाब'},{key:'v',label:'रक्कम',num:true}], [

      ], {h:'एकूण दायित्व', v:fmtMoney(totalLiab)})}
      <div class="panel-head" style="margin-top:14px;"><h3 style="font-size:15px;">भांडवल (Equity — भाग भांडवल)</h3></div>
      ${dataTable([{key:'h',label:'बाब'},{key:'v',label:'रक्कम',num:true}], [{h:`भाग भांडवल (एकूण ${shareCount} भाग)`, v:fmtMoney(shareTotal)}], {h:'एकूण भांडवल', v:fmtMoney(shareTotal)})}
      <div class="stat-row" style="margin-top:16px;">
        <div class="stat" style="border-top-color:var(--green)"><div class="num">${fmtMoney(totalAssets)}</div><div class="lbl">एकूण मालमत्ता</div></div>
        <div class="stat" style="border-top-color:var(--rust)"><div class="num">${fmtMoney(totalLiabPlusEquity)}</div><div class="lbl">एकूण दायित्व+भांडवल</div></div>
        <div class="stat"><div class="num">${fmtMoney(diff)}</div><div class="lbl">फरक (राखीव निधी/तोटा दर्शवतो)</div></div>

/* ---------- सभासद वयोगट/लिंग-वार विश्लेषण ---------- */
async function renderDemographicReport(c){
  c.innerHTML = '<div class="empty">डेटा गोळा करत आहे...</div>';
  try {
    const members = await fetchAllRows('members', 'sex,birth_date,membership_status');
    const active = members.filter(m => m.membership_status === 'active' || !m.membership_status);
    const AGE_BUCKETS = ['18-25','26-35','36-45','46-55','56-65','66+','अज्ञात'];
    const calcAge = (dob) => {
      if (!dob) return null;
      const b = new Date(dob), t = new Date();
      let age = t.getFullYear() - b.getFullYear();
      if (t.getMonth() < b.getMonth() || (t.getMonth()===b.getMonth() && t.getDate()<b.getDate())) age--;
      return age;
    };
    const bucketOf = (age) => {
      if (age == null || isNaN(age)) return 'अज्ञात';
      if (age <= 25) return '18-25';
      if (age <= 35) return '26-35';
      if (age <= 45) return '36-45';
      if (age <= 55) return '46-55';
      if (age <= 65) return '56-65';
      return '66+';
    };
    const grid = {}; // ageBucket -> sex -> count
    const sexKeys = new Set();
    AGE_BUCKETS.forEach(b => grid[b] = {});
    active.forEach(m => {
      const bucket = bucketOf(calcAge(m.birth_date));
      const sex = m.sex || '(अज्ञात)';
      sexKeys.add(sex);
      grid[bucket][sex] = (grid[bucket][sex]||0) + 1;
    });
    const sexList = Array.from(sexKeys).sort();
    const headerHtml = sexList.map(s => `<th style="text-align:right;">${s}</th>`).join('');
    const bodyHtml = AGE_BUCKETS.map(b => {
      const rowTotal = sexList.reduce((s,sx)=>s+(grid[b][sx]||0),0);
      if (rowTotal === 0) return '';
      const cells = sexList.map(sx => `<td style="text-align:right;">${grid[b][sx]||0}</td>`).join('');
      return `<tr><td>${b}</td>${cells}<td style="text-align:right;font-weight:700;">${rowTotal}</td></tr>`;
    }).join('');
    const colTotals = sexList.map(sx => AGE_BUCKETS.reduce((s,b)=>s+(grid[b][sx]||0),0));
    const grandTotal = colTotals.reduce((s,x)=>s+x,0);

    c.innerHTML = `
      <div class="stat-row" style="margin-bottom:14px;">
        <div class="stat" style="border-top-color:var(--green)"><div class="num">${active.length}</div><div class="lbl">एकूण सक्रिय सभासद</div></div>
        ${sexList.map(sx => `<div class="stat"><div class="num">${colTotals[sexList.indexOf(sx)]}</div><div class="lbl">${sx}</div></div>`).join('')}
      </div>
      <div class="panel">
        <h3>वयोगट × लिंग — क्रॉस-टॅब</h3>
        <div class="table-scroll">
          <table class="data-table">
            <thead><tr><th>वयोगट</th>${headerHtml}<th>एकूण</th></tr></thead>
            <tbody>${bodyHtml}</tbody>
            <tfoot><tr style="font-weight:700;border-top:2px solid var(--border);"><td>एकूण</td>${colTotals.map(t=>`<td style="text-align:right;">${t}</td>`).join('')}<td style="text-align:right;">${grandTotal}</td></tr></tfoot>
          </table>
        </div>
        <p style="font-size:11px;color:#999;margin-top:10px;">* ज्या सभासदांची जन्मतारीख नोंदलेली नाही, ते "अज्ञात" वयोगटात दाखवले आहेत.</p>

    `;

async function runCustomReport(){
  const rowDim = document.getElementById('cr-row').value;
  const colDim = document.getElementById('cr-col').value;
  const resEl = document.getElementById('cr-result');
  if (rowDim === colDim){ resEl.innerHTML = '<div class="banner warn">ओळी व स्तंभ यांसाठी वेगवेगळे निकष निवडा.</div>'; return; }
  resEl.innerHTML = '<div class="empty">तयार करत आहे... (मोठा डेटा असल्यास थोडा वेळ लागू शकतो)</div>';
  try {
    const members = await fetchAllRows('members',
      'id,sex,membership_status,castes(name),occupations(name),branches(name)');

    const getVal = (m, dim) => {
      if (dim === 'caste') return m.castes?.name || '(अज्ञात)';
      if (dim === 'occupation') return m.occupations?.name || '(अज्ञात)';
      if (dim === 'branch') return m.branches?.name || '(अज्ञात)';
      if (dim === 'sex') return m.sex || '(अज्ञात)';
      if (dim === 'membership_status') return m.membership_status || '(अज्ञात)';
      return '(अज्ञात)';
    };

    const rowKeys = new Set(), colKeys = new Set();
    const grid = {}; // rowKey -> colKey -> count
    members.forEach(m => {
      const rk = getVal(m, rowDim), ck = getVal(m, colDim);
      rowKeys.add(rk); colKeys.add(ck);
      grid[rk] = grid[rk] || {};
      grid[rk][ck] = (grid[rk][ck] || 0) + 1;
    });

    const rowList = Array.from(rowKeys).sort();
    const colList = Array.from(colKeys).sort();

    const headerHtml = colList.map(ck => `<th style="text-align:right;">${ck}</th>`).join('');
    const bodyHtml = rowList.map(rk => {
      const rowTotal = colList.reduce((s,ck) => s + (grid[rk][ck]||0), 0);
      const cells = colList.map(ck => `<td style="text-align:right;">${grid[rk][ck] || 0}</td>`).join('');
      return `<tr><td>${rk}</td>${cells}<td style="text-align:right;font-weight:700;">${rowTotal}</td></tr>`;
    }).join('');
    const colTotals = colList.map(ck => rowList.reduce((s,rk) => s + (grid[rk][ck]||0), 0));
    const grandTotal = colTotals.reduce((s,x)=>s+x,0);
    const footerHtml = `<tr style="font-weight:700;border-top:2px solid var(--border);"><td>एकूण</td>${colTotals.map(t=>`<td style="text-align:right;">${t}</td>`).join('')}<td style="text-align:right;">${grandTotal}</td></tr>`;

    resEl.innerHTML = `
      <div class="table-scroll">
        <table class="data-table">
          <thead><tr><th>${CUSTOM_REPORT_DIMENSIONS[rowDim]} \\ ${CUSTOM_REPORT_DIMENSIONS[colDim]}</th>${headerHtml}<th>एकूण</th></tr></thead>
          <tbody>${bodyHtml}</tbody>
          <tfoot>${footerHtml}</tfoot>
        </table>
      </div>
      <button class="btn ghost small" id="cr-export-btn" style="margin-top:10px;">CSV म्हणून डाउनलोड करा</button>
    `;
    document.getElementById('cr-export-btn').addEventListener('click', () => {
      const lines = [[CUSTOM_REPORT_DIMENSIONS[rowDim]+'\\'+CUSTOM_REPORT_DIMENSIONS[colDim], ...colList, 'एकूण'].join(',')];
      rowList.forEach(rk => {
        const rowTotal = colList.reduce((s,ck) => s + (grid[rk][ck]||0), 0);
        lines.push([`"${rk}"`, ...colList.map(ck => grid[rk][ck]||0), rowTotal].join(','));
      });
      lines.push(['एकूण', ...colTotals, grandTotal].join(','));
      const blob = new Blob(['\uFEFF'+lines.join('\n')], {type:'text/csv;charset=utf-8'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = `custom_report_${rowDim}_x_${colDim}.csv`; a.click();
    });
  } catch(e){ resEl.innerHTML = errBanner('रिपोर्ट त्रुटी: ' + e.message); }
}

async function renderBranchScorecard(c){
  c.innerHTML = '<div class="empty">डेटा गोळा करत आहे... (मोठा डेटा असल्यास थोडा वेळ लागू शकतो)</div>';
  try {
    const [branches, accounts, installments] = await Promise.all([
      fetchAllRows('branches', 'id,name'),
      fetchAllRows('accounts', 'id,branch_id,product_type,current_balance,status'),
      fetchAllRows('loan_installments', 'account_id,due_date,principal_due,interest_due,principal_paid,interest_paid'),
    ]);

    const today = todayStr();
    const accById = {}; accounts.forEach(a => accById[a.id] = a);

    const stats = {}; // branch_id -> {deposit, loan, overdueCount, dueCount}
    branches.forEach(b => { stats[b.id] = { name: b.name, deposit:0, loan:0, loanCount:0, overdueDueAmt:0, totalDueAmt:0 }; });
    stats['__unknown'] = { name:'अज्ञात शाखा', deposit:0, loan:0, loanCount:0, overdueDueAmt:0, totalDueAmt:0 };

    accounts.filter(a=>a.status==='active').forEach(a => {
      const key = stats[a.branch_id] ? a.branch_id : '__unknown';
      const bal = Math.abs(Number(a.current_balance||0));
      if (['savings','fd','rd','pigmy'].includes(a.product_type)) stats[key].deposit += bal;
      else if (a.product_type === 'loan'){ stats[key].loan += bal; stats[key].loanCount++; }
    });

    installments.forEach(i => {
      const acc = accById[i.account_id];
      if (!acc) return;
      const key = stats[acc.branch_id] ? acc.branch_id : '__unknown';
      const due = Number(i.principal_due||0)+Number(i.interest_due||0);
      const paid = Number(i.principal_paid||0)+Number(i.interest_paid||0);
      const outstanding = due - paid;
      if (outstanding > 1){
        stats[key].totalDueAmt += due;
        if (i.due_date < today) stats[key].overdueDueAmt += outstanding;
      }
    });

    const rows = Object.values(stats).filter(s => s.deposit>0 || s.loan>0).map(s => {
      const recoveryPct = s.totalDueAmt > 0 ? Math.max(0, 100 - (s.overdueDueAmt / s.totalDueAmt * 100)) : 100;
      // साधा स्कोअर: recovery% ला जास्त वजन, आकारमानही थोडं गृहीत धरतो (मोठी शाखा किंचित जास्त गुण)
      const sizeScore = Math.min(20, (s.deposit + s.loan) / 1000000); // दर १० लाखाला १ गुण, कमाल २०
      const score = (recoveryPct * 0.8) + sizeScore;
      return { ...s, recoveryPct, score };
    }).sort((a,b) => b.score - a.score);

    const rowHtml = rows.map((s,i) => `
      <tr>
        <td>${i+1}</td>
        <td>${s.name}</td>
        <td style="text-align:right;">${fmtMoney(s.deposit)}</td>
        <td style="text-align:right;">${fmtMoney(s.loan)}</td>
        <td style="text-align:right;">${s.loanCount}</td>
        <td style="text-align:right;color:${s.recoveryPct>=90?'var(--green)':s.recoveryPct>=75?'#e6b800':'var(--rust)'};font-weight:600;">${s.recoveryPct.toFixed(1)}%</td>
        <td style="text-align:right;font-weight:700;">${s.score.toFixed(1)}</td>
      </tr>`).join('');

    c.innerHTML = `
      <div class="panel">
        <h3>शाखा-कामगिरी स्कोअरकार्ड</h3>
        <p style="color:#777;font-size:12.5px;">प्रत्येक शाखेची ठेवी, कर्ज-वितरण आणि वसुली-टक्केवारी (Recovery %) एकत्र बघून एक सोपा तुलना-गुण (score) दिला आहे — जास्त गुण = चांगली कामगिरी. वसुली% ला ८०% वजन, आकारमानाला २०% वजन दिलं आहे.</p>
        <div class="table-scroll">
          <table class="data-table">
            <thead><tr><th>क्रम</th><th>शाखा</th><th style="text-align:right;">एकूण ठेवी</th><th style="text-align:right;">एकूण कर्ज</th><th style="text-align:right;">कर्ज-खाती</th><th style="text-align:right;">वसुली %</th><th style="text-align:right;">गुण</th></tr></thead>
            <tbody>${rowHtml || '<tr><td colspan="7" class="empty">डेटा सापडला नाही.</td></tr>'}</tbody>
          </table>
        </div>
        <p style="font-size:11px;color:#999;margin-top:10px;">* वसुली% म्हणजे थकीत हप्त्यांच्या तुलनेत न भरलेल्या रकमेची टक्केवारी उलटी काढून — फक्त सापेक्ष तुलनेसाठी, अधिकृत NPA गणित नाही.</p>
      </div>
    `;
  } catch(e){ c.innerHTML = errBanner('स्कोअरकार्ड त्रुटी: ' + e.message); }
}

async function runYoyComparison(){
  const dateA = document.getElementById('yoy-date-a').value;
  const dateB = document.getElementById('yoy-date-b').value;
  const resEl = document.getElementById('yoy-result');
  if (!dateA || !dateB){ resEl.innerHTML = '<div class="banner warn">दोन्ही तारखा निवडा.</div>'; return; }
  resEl.innerHTML = '<div class="empty">गणित करत आहे...</div>';
  try {
    const [{data:balA, error:errA}, {data:balB, error:errB}] = await Promise.all([
      sbClient.rpc('gl_trial_balance_asof', { asof: dateA }),
      sbClient.rpc('gl_trial_balance_asof', { asof: dateB }),
    ]);
    if (errA || errB){ resEl.innerHTML = errBanner('त्रुटी: ' + (errA?.message || errB?.message)); return; }

    const CATEGORY_LABEL = { B:'बँक', D:'ठेव', L:'कर्ज', G:'सर्वसाधारण' };
    const sumByCategory = rows => {
      const out = {};
      (rows||[]).forEach(r => { const k = r.category || 'G'; out[k] = (out[k]||0) + Math.abs(Number(r.computed_balance||0)); });
      return out;
    };
    const sumA = sumByCategory(balA), sumB = sumByCategory(balB);
    const allCats = Array.from(new Set([...Object.keys(sumA), ...Object.keys(sumB)]));
    const order = ['B','D','L','G'];
    allCats.sort((x,y) => order.indexOf(x) - order.indexOf(y));

    const rows = allCats.map(cat => {
      const a = sumA[cat] || 0, b = sumB[cat] || 0;
      const diff = b - a;
      const pct = a !== 0 ? (diff / a * 100) : (b !== 0 ? 100 : 0);
      return { cat, a, b, diff, pct };
    });
    const totalA = rows.reduce((s,r)=>s+r.a,0), totalB = rows.reduce((s,r)=>s+r.b,0);
    const totalDiff = totalB - totalA;
    const totalPct = totalA !== 0 ? (totalDiff/totalA*100) : 0;

    const rowHtml = rows.map(r => `
      <tr>
        <td>${CATEGORY_LABEL[r.cat] || r.cat}</td>
        <td style="text-align:right;">${fmtMoney(r.a)}</td>
        <td style="text-align:right;">${fmtMoney(r.b)}</td>
        <td style="text-align:right;color:${r.diff>=0?'var(--green)':'var(--rust)'};font-weight:600;">${r.diff>=0?'+':''}${fmtMoney(r.diff)}</td>
        <td style="text-align:right;color:${r.pct>=0?'var(--green)':'var(--rust)'};font-weight:600;">${r.pct>=0?'+':''}${r.pct.toFixed(1)}%</td>
      </tr>`).join('');

    resEl.innerHTML = `
      <div class="table-scroll">
        <table class="data-table">
          <thead><tr><th>गट</th><th style="text-align:right;">${dateA}</th><th style="text-align:right;">${dateB}</th><th style="text-align:right;">फरक</th><th style="text-align:right;">वाढ %</th></tr></thead>
          <tbody>${rowHtml}</tbody>
          <tfoot><tr style="font-weight:700;border-top:2px solid var(--border);">
            <td>एकूण</td><td style="text-align:right;">${fmtMoney(totalA)}</td><td style="text-align:right;">${fmtMoney(totalB)}</td>
            <td style="text-align:right;color:${totalDiff>=0?'var(--green)':'var(--rust)'};">${totalDiff>=0?'+':''}${fmtMoney(totalDiff)}</td>
            <td style="text-align:right;color:${totalPct>=0?'var(--green)':'var(--rust)'};">${totalPct>=0?'+':''}${totalPct.toFixed(1)}%</td>
          </tr></tfoot>
        </table>
      </div>
      <p style="font-size:11px;color:#999;margin-top:10px;">* आकडे journal_entries वर आधारित GL शिल्लकेतून काढलेले आहेत — काही GL गटांत (उदा. बंद कर्ज खाती) ज्ञात डेटा-विसंगती असू शकते.</p>
    `;
  } catch(e){ resEl.innerHTML = errBanner('त्रुटी: ' + e.message); }
}

/* ---------- समभाग (Share) नोंदवही ---------- */
async function renderShareCapitalRegister(c, searchTerm){
  c.innerHTML = '<div class="empty">लोड होत आहे...</div>';
  try {
    const rows = await fetchAllRows('share_transactions',
      'member_id,transfer_to_member_id,no_of_shares,share_value,txn_type,txn_date,certificate_no,members!member_id(name,member_no)');
    const agg = {};
    const ensure = id => { if(!agg[id]) agg[id] = {shares:0, value:0, name:'', member_no:'', lastCert:'', lastDate:''}; return agg[id]; };
    rows.forEach(r=>{
      const shares = Number(r.no_of_shares||0), value = shares * Number(r.share_value||0);
      if (r.txn_type === 'issue'){
        const a = ensure(r.member_id);
        a.shares += shares; a.value += value;
        if (r.members){ a.name = r.members.name; a.member_no = r.members.member_no; }
        if (!a.lastDate || r.txn_date > a.lastDate){ a.lastDate = r.txn_date; a.lastCert = r.certificate_no || a.lastCert; }
      } else { // transfer व इतर प्रकार — सध्या फक्त 1 व्यवहार आहे, त्यामुळे मूळ खात्यातून वजा व लाभार्थ्याकडे जमा
        const from = ensure(r.member_id); from.shares -= shares; from.value -= value;
        if (r.transfer_to_member_id){ const to = ensure(r.transfer_to_member_id); to.shares += shares; to.value += value; }
      }
    });
    let list = Object.values(agg).filter(a=>a.shares > 0);
    if (searchTerm){ const t = searchTerm.toLowerCase(); list = list.filter(a=>(a.name||'').toLowerCase().includes(t) || (a.member_no||'').includes(t)); }
    list.sort((a,b)=>(a.member_no||'').localeCompare(b.member_no||''));
    const totalShares = list.reduce((s,x)=>s+x.shares,0);
    const totalValue = list.reduce((s,x)=>s+x.value,0);
    const trows = list.map(x=>({no:x.member_no||'', name:x.name||'<span style="color:#c0392b;">(सापडले नाही)</span>', shares:x.shares, value:fmtMoney(x.value), cert:x.lastCert||'', date:x.lastDate||''}));
    const controls = `<input type="text" id="sc-search" placeholder="सभासद नाव/क्र शोधा" value="${searchTerm||''}" style="width:auto;" onkeydown="if(event.key==='Enter') renderShareCapitalRegister(document.getElementById('content'), document.getElementById('sc-search').value)">
      <button class="btn ghost small" onclick="renderShareCapitalRegister(document.getElementById('content'), document.getElementById('sc-search').value)">शोधा</button>`;
    const body = dataTable(
      [{key:'no',label:'सभासद क्र'},{key:'name',label:'सभासद'},{key:'shares',label:'एकूण भाग (शेअर्स)',num:true},
       {key:'value',label:'एकूण भाग रक्कम',num:true},{key:'cert',label:'शेवटचा प्रमाणपत्र क्र'},{key:'date',label:'शेवटचा दिनांक'}],
      trows, {no:`एकूण सभासद: ${list.length}`, shares:totalShares, value:fmtMoney(totalValue)}
    );
    const note = `<div class="banner warn" style="margin-bottom:10px;">⚠ हे share_transactions (${rows.length} एकूण व्यवहार — बहुतांश 'issue', फक्त 1 'transfer') वरून काढलेले एकत्रित आकडे आहेत. वेगळं share_certificates टेबल अजून रिकामं आहे.</div>`;
    c.innerHTML = reportShell('समभाग (Share) नोंदवही', `एकूण भाग: ${totalShares}, एकूण रक्कम: ${fmtMoney(totalValue)}`, controls, note+body);
  } catch(e){ c.innerHTML = errBanner(e.message); }
}

/* =========================================================
   इम्पोर्ट इंजिन (CSV Bulk Import) — पहिला टप्पा: सभासद (members)
   हे generic ठेवलंय — पुढे accounts/loans साठी फक्त एक नवीन config
   IMPORT_CONFIGS मध्ये जोडायचा, बाकी लॉजिक (parse/preview/import) तेच वापरतं.
   ========================================================= */

/* ---- साधा पण सुरक्षित CSV पार्सर — quoted फील्ड्स/स्वल्पविराम/नवीन-ओळ हाताळतो ---- */
/* ---------- मराठी (Devanagari) → इंग्रजी अक्षरांतर — फक्त सर्चसाठी, अचूक स्पेलिंगसाठी नाही ----------
   (उदा. "पाटील" → "Patila" येऊ शकतं, बरोबर स्पेलिंग "Patil" नाही — पण "patil" टाईप केल्यास
   ते "patila" मध्ये सापडेलच, कारण सर्च नेहमी "समाविष्ट आहे का" (contains) पद्धतीने होतो.) */
const DEV_VOWELS = {'अ':'a','आ':'a','इ':'i','ई':'i','उ':'u','ऊ':'u','ऋ':'ri','ए':'e','ऐ':'ai','ओ':'o','औ':'au'};
const DEV_MATRAS = {'ा':'a','ि':'i','ी':'i','ु':'u','ू':'u','ृ':'ri','े':'e','ै':'ai','ो':'o','ौ':'au'};
const DEV_CONSONANTS = {
  'क':'k','ख':'kh','ग':'g','घ':'gh','ङ':'ng','च':'ch','छ':'chh','ज':'j','झ':'jh','ञ':'ny',
  'ट':'t','ठ':'th','ड':'d','ढ':'dh','ण':'n','त':'t','थ':'th','द':'d','ध':'dh','न':'n',
  'प':'p','फ':'ph','ब':'b','भ':'bh','म':'m','य':'y','र':'r','ल':'l','व':'v','श':'sh','ष':'sh','स':'s','ह':'h','ळ':'l',
};
const DEV_HALANT = '्';
function devanagariToRoman(text){
  if (!text) return '';
  let result = '';
  const chars = Array.from(text);
  for (let i=0; i<chars.length; i++){
    const ch = chars[i];
    if (DEV_CONSONANTS[ch]){
      const cr = DEV_CONSONANTS[ch]; const next = chars[i+1];
      if (next === DEV_HALANT){ result += cr; i++; continue; }
      if (next && DEV_MATRAS[next]){ result += cr + DEV_MATRAS[next]; i++; continue; }
      if (next === 'ं' || next === 'ँ'){ result += cr + 'an'; i++; continue; }
      if (next === 'ः'){ result += cr + 'ah'; i++; continue; }
      result += cr + 'a'; continue; // बेअर व्यंजन — नेहमी 'a' जोडतो (सर्चसाठी पुरेसं)
    }
    if (DEV_VOWELS[ch]){ result += DEV_VOWELS[ch]; continue; }
    if (ch === 'ं' || ch === 'ँ'){ result += 'n'; continue; }
    if (ch === 'ः'){ result += 'h'; continue; }
    if (ch === DEV_HALANT){ continue; }
    result += ch; // स्पेस/विरामचिन्हं/अंक जसेच्या तसे
  }
  return result.replace(/\b\w/g, ch => ch.toUpperCase());
}

function parseCSV(text){
  const rows = []; let row = [], field = '', inQuotes = false;
  text = text.replace(/^\uFEFF/, ''); // BOM काढतो
  for (let i=0; i<text.length; i++){
    const ch = text[i], next = text[i+1];
    if (inQuotes){
      if (ch === '"' && next === '"'){ field += '"'; i++; }
      else if (ch === '"'){ inQuotes = false; }
      else field += ch;
    } else {
      if (ch === '"'){ inQuotes = true; }
      else if (ch === ','){ row.push(field); field=''; }
      else if (ch === '\r'){ /* skip */ }
      else if (ch === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else field += ch;
    }
  }
  if (field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.length>1 || (r[0]||'').trim()!=='');
}

const IMPORT_CONFIGS = {
  members: {
    table: 'members',
    label: 'सभासद (Members)',
    uniqueField: 'member_no',
    fields: [
      {key:'member_no', label:'सभासद क्रमांक', required:true},
      {key:'name', label:'नाव', required:true},
      {key:'name_en', label:'नाव (English)'},
      {key:'father_husband_name', label:'वडील/पतीचे नाव'},
      {key:'address_line1', label:'पत्ता ओळ १'},
      {key:'address_line2', label:'पत्ता ओळ २'},
      {key:'address_line3', label:'पत्ता ओळ ३'},
      {key:'pincode', label:'पिनकोड'},
      {key:'phone', label:'फोन'},
      {key:'mobile', label:'मोबाईल'},
      {key:'email', label:'ईमेल'},
      {key:'sex', label:'लिंग', enumVals:['M','F','O']},
      {key:'birth_date', label:'जन्मतारीख (YYYY-MM-DD)', type:'date'},
      {key:'join_date', label:'सभासद तारीख (YYYY-MM-DD)', type:'date'},
      {key:'membership_status', label:'स्थिती', enumVals:['active','inactive','deceased','resigned'], defaultVal:'active'},
      {key:'old_member_nr', label:'जुना सभासद क्र (संदर्भ)'},
    ]
  }
};

let IMPORT_STATE = { headers:[], rows:[], mapping:{}, configKey:null, validated:null };

// मराठी/इंग्रजी सामान्य हेडर-नावांवरून आपोआप अंदाज बांधणारी fuzzy-match यादी
const HEADER_HINTS = {
  member_no:['सभासद क्र','सभासद क्रमांक','member no','memberno','member_no','अ.क्र'],
  name:['नाव','सभासदाचे नाव','name'],
  name_en:['name english','english name','name_en'],
  father_husband_name:['वडील','पतीचे नाव','वडील/पतीचे नाव','father','husband'],
  address_line1:['पत्ता','address','पत्ता १','पत्ता1'],
  address_line2:['पत्ता २','पत्ता2','address2'],
  pincode:['पिन','pincode','pin code'],
  phone:['फोन','दुरध्वनी','phone'],
  mobile:['मोबाईल','मोबाइल','mobile'],
  email:['ईमेल','email'],
  sex:['लिंग','sex','gender'],
  birth_date:['जन्म','जन्मतारीख','birth date','dob'],
  join_date:['सभासद तारीख','join date','joining'],
  membership_status:['स्थिती','status'],
  old_member_nr:['जुना क्र','जुना सभासद','old member'],
};

function guessMapping(headers, config){
  const map = {};
  headers.forEach((h, idx) => {
    const hl = (h||'').trim().toLowerCase();
    let best = '';
    for (const f of config.fields){
      const hints = HEADER_HINTS[f.key] || [f.label.toLowerCase()];
      if (hints.some(hint => hl === hint.toLowerCase() || hl.includes(hint.toLowerCase()))){ best = f.key; break; }
    }
    map[idx] = best;
  });
  return map;
}

async function renderImport(c){
  IMPORT_STATE = { headers:[], rows:[], mapping:{}, configKey:'members', validated:null };
  c.innerHTML = `
    <div class="panel">
      <h3>Bulk Import — सभासद (Members)</h3>
      <p style="color:#777;font-size:12.5px;">CSV फाईल निवडा (पहिली ओळ हेडर असावी). त्यानंतर कॉलम-मॅपिंग, प्रिव्ह्यू आणि validation दाखवलं जाईल — शेवटी तुम्ही खात्री केल्यावरच डेटा जोडला जाईल.</p>
      <input type="file" id="import-file" accept=".csv" style="margin:10px 0;">
      <div id="import-body"></div>
    </div>
  `;
  document.getElementById('import-file').addEventListener('change', async (ev) => {
    const file = ev.target.files[0];
    if (!file) return;
    const text = await file.text();
    const rows = parseCSV(text);
    if (!rows.length){ document.getElementById('import-body').innerHTML = '<div class="banner warn">फाईल रिकामी दिसतेय.</div>'; return; }
    IMPORT_STATE.headers = rows[0];
    IMPORT_STATE.rows = rows.slice(1);
    IMPORT_STATE.mapping = guessMapping(IMPORT_STATE.headers, IMPORT_CONFIGS.members);
    renderMappingStep(document.getElementById('import-body'));
  });
}

function renderMappingStep(el){
  const config = IMPORT_CONFIGS[IMPORT_STATE.configKey];
  const fieldOptions = ['(वगळा)', ...config.fields.map(f=>f.key)];
  const rowsHtml = IMPORT_STATE.headers.map((h, idx) => {
    const sel = IMPORT_STATE.mapping[idx] || '';
    const opts = fieldOptions.map(fk => {
      const val = fk === '(वगळा)' ? '' : fk;
      const label = fk === '(वगळा)' ? fk : (config.fields.find(f=>f.key===fk)?.label || fk);
      return `<option value="${val}" ${val===sel?'selected':''}>${label}</option>`;
    }).join('');
    return `<tr><td>${h || '(रिकामं हेडर)'}</td><td><select data-idx="${idx}" class="map-sel">${opts}</select></td></tr>`;
  }).join('');
  el.innerHTML = `
    <div style="margin-top:14px;">
      <div class="banner warn">एकूण ${IMPORT_STATE.rows.length} ओळी सापडल्या. प्रत्येक फाईल-कॉलमसाठी योग्य सिस्टिम-फील्ड निवडा (आपोआप अंदाज लावलाय, गरज असल्यास बदला).</div>
      <table class="data-table"><thead><tr><th>फाईलमधलं हेडर</th><th>→ सिस्टिम फील्ड</th></tr></thead><tbody>${rowsHtml}</tbody></table>
      <button class="btn" id="btn-preview" style="margin-top:12px;">पुढे — प्रिव्ह्यू व तपासणी</button>
    </div>`;
  el.querySelectorAll('.map-sel').forEach(sel => {
    sel.addEventListener('change', e => { IMPORT_STATE.mapping[e.target.dataset.idx] = e.target.value; });
  });
  document.getElementById('btn-preview').addEventListener('click', () => validateAndPreview(el));
}

async function validateAndPreview(el){
  el.innerHTML = '<div class="empty">तपासत आहे...</div>';
  const config = IMPORT_CONFIGS[IMPORT_STATE.configKey];
  const mappedKeys = Object.values(IMPORT_STATE.mapping).filter(Boolean);
  const missingRequired = config.fields.filter(f=>f.required && !mappedKeys.includes(f.key));
  if (missingRequired.length){
    el.innerHTML = `<div class="banner warn">या आवश्यक फील्ड्स मॅप केलेल्या नाहीत: ${missingRequired.map(f=>f.label).join(', ')}. वर जाऊन मॅपिंग पूर्ण करा.</div>`;
    return;
  }
  // प्रत्येक फाईल-ओळीला ऑब्जेक्टमध्ये रूपांतर
  const records = IMPORT_STATE.rows.map((r, i) => {
    const obj = { __rowNum: i+2 };
    Object.entries(IMPORT_STATE.mapping).forEach(([idx, key]) => {
      if (!key) return;
      let val = (r[idx] || '').trim();
      obj[key] = val === '' ? null : val;
    });
    return obj;
  });
  // डुप्लिकेट (फाईलमध्येच) तपासणी
  const seen = new Set(); const errors = {};
  records.forEach(rec => {
    const errs = [];
    config.fields.filter(f=>f.required).forEach(f => { if (!rec[f.key]) errs.push(`${f.label} रिकामं`); });
    if (rec[config.uniqueField]){
      if (seen.has(rec[config.uniqueField])) errs.push('फाईलमध्येच डुप्लिकेट ' + config.uniqueField);
      seen.add(rec[config.uniqueField]);
    }
    config.fields.forEach(f => {
      if (f.enumVals && rec[f.key] && !f.enumVals.includes(rec[f.key])){
        if (f.defaultVal){ rec[f.key] = f.defaultVal; } // सौम्य दुरुस्ती: चुकीचं/रिकामं असल्यास डीफॉल्ट
        else errs.push(`${f.label} ची व्हॅल्यू '${rec[f.key]}' अवैध (हवं: ${f.enumVals.join('/')})`);
      }
    });
    if (errs.length) errors[rec.__rowNum] = errs;
  });
  // DB मध्ये आधीच असलेले member_no तपासणे (existing duplicates)
  const fileNos = records.map(r=>r[config.uniqueField]).filter(Boolean);
  let existing = new Set();
  if (fileNos.length){
    const { data } = await sbClient.from(config.table).select(config.uniqueField).in(config.uniqueField, fileNos);
    (data||[]).forEach(d => existing.add(d[config.uniqueField]));
  }
  records.forEach(rec => {
    if (rec[config.uniqueField] && existing.has(rec[config.uniqueField])){
      errors[rec.__rowNum] = (errors[rec.__rowNum]||[]).concat(['हा ' + config.uniqueField + ' आधीच सिस्टिममध्ये आहे']);
    }
  });
  IMPORT_STATE.validated = { records, errors };
  const okCount = records.length - Object.keys(errors).length;
  const previewRows = records.slice(0,15).map(rec => {
    const errList = errors[rec.__rowNum];
    return `<tr style="${errList?'background:#fdeeee;':''}"><td>${rec.__rowNum}</td><td>${rec[config.uniqueField]||''}</td><td>${rec.name||''}</td><td>${errList ? '❌ '+errList.join('; ') : '✓ ठीक'}</td></tr>`;
  }).join('');
  el.innerHTML = `
    <div class="stat-row" style="margin:14px 0;">
      <div class="stat" style="border-top-color:var(--green)"><div class="num">${records.length}</div><div class="lbl">एकूण ओळी</div></div>
      <div class="stat" style="border-top-color:var(--green)"><div class="num">${okCount}</div><div class="lbl">वैध (import होतील)</div></div>
      <div class="stat" style="border-top-color:var(--rust)"><div class="num">${Object.keys(errors).length}</div><div class="lbl">त्रुटी (वगळल्या जातील)</div></div>
    </div>
    <table class="data-table"><thead><tr><th>ओळ #</th><th>सभासद क्र</th><th>नाव</th><th>स्थिती</th></tr></thead><tbody>${previewRows}</tbody></table>
    ${records.length>15 ? `<p style="color:#888;font-size:12px;">...आणखी ${records.length-15} ओळी (फक्त पहिल्या १५ इथे दाखवल्या)</p>` : ''}
    <button class="btn" id="btn-do-import" ${okCount===0?'disabled':''} style="margin-top:12px;">✓ ${okCount} वैध ओळी Import करा</button>
    <button class="btn ghost" id="btn-dl-errors" style="margin-top:12px;margin-left:8px;" ${Object.keys(errors).length===0?'disabled':''}>त्रुटी असलेल्या ओळी CSV म्हणून डाउनलोड करा</button>
  `;
  document.getElementById('btn-do-import').addEventListener('click', () => runImport(el));
  document.getElementById('btn-dl-errors').addEventListener('click', () => downloadErrorRows(config));
}

function downloadErrorRows(config){
  const { records, errors } = IMPORT_STATE.validated;
  const bad = records.filter(r => errors[r.__rowNum]);
  const header = ['ओळ_क्र','कारण', ...config.fields.map(f=>f.key)];
  const lines = [header.join(',')];
  bad.forEach(r => {
    const reason = (errors[r.__rowNum]||[]).join(' | ').replace(/,/g,';');
    const vals = [r.__rowNum, `"${reason}"`, ...config.fields.map(f=>`"${(r[f.key]||'').toString().replace(/"/g,'""')}"`)];
    lines.push(vals.join(','));
  });
  const blob = new Blob(['\uFEFF'+lines.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'import_errors.csv'; a.click();
}

async function runImport(el){
  const config = IMPORT_CONFIGS[IMPORT_STATE.configKey];
  const { records, errors } = IMPORT_STATE.validated;
  const validRecords = records.filter(r => !errors[r.__rowNum]).map(r => {
    const clean = {};
    config.fields.forEach(f => { if (r[f.key] !== undefined) clean[f.key] = r[f.key]; });
    if (config.table === 'members' && !clean.name_en && clean.name){ clean.name_en = devanagariToRoman(clean.name); }
    return clean;
  });
  el.innerHTML = '<div class="empty">Import होत आहे... कृपया थांबा.</div>';
  let successCount = 0; const failDetails = [];
  const chunkSize = 200;
  for (let i=0; i<validRecords.length; i += chunkSize){
    const chunk = validRecords.slice(i, i+chunkSize);
    const { error } = await sbClient.from(config.table).insert(chunk);
    if (error) failDetails.push(`ओळी ${i+1}-${i+chunk.length}: ${error.message}`);
    else successCount += chunk.length;
  }
  // import_logs टेबल असेल तर नोंद करतो (नसेल तर शांतपणे दुर्लक्ष)
  try {
    await sbClient.from('import_logs').insert({
      table_name: config.table, file_name: null,
      total_rows: records.length, success_count: successCount,
      failed_count: records.length - successCount,
      imported_by: CURRENT_STAFF ? CURRENT_STAFF.id : null,
      error_details: { skipped: Object.keys(errors).length, batch_errors: failDetails }
    });
  } catch(e) { /* import_logs टेबल नसेल तर दुर्लक्ष */ }
  el.innerHTML = `
    <div class="banner ${failDetails.length?'warn':''}" style="background:${failDetails.length?'':'#eaf7ea'};">
      ✓ ${successCount} सभासद यशस्वीरित्या जोडले गेले.
      ${Object.keys(errors).length ? `${Object.keys(errors).length} ओळी त्रुटींमुळे वगळल्या गेल्या.` : ''}
      ${failDetails.length ? '<br>बॅच एरर: ' + failDetails.join('; ') : ''}
    </div>
    <button class="btn ghost" onclick="render('members')" style="margin-top:10px;">सभासद यादीकडे जा</button>
    <button class="btn ghost" onclick="render('import')" style="margin-top:10px;margin-left:8px;">आणखी एक फाईल Import करा</button>
  `;
}


/* =========================================================
   डेटा साफसफाई — (अ) जात/व्यवसाय लूकअप मधला जुन्या-फॉन्टचा भ्रष्ट मजकूर दुरुस्ती
                  (ब) सभासदांच्या sex फील्डमधल्या संभाव्य चुका शोधणे
   दोन्हीकडे: फक्त सुचवणी दाखवली जाते — प्रत्येक नोंद बघून, मान्य केल्यावरच बदलते.
   ========================================================= */

/* =========================================================
   सूचना केंद्र (Notification Center)
   — थकीत/येऊ घातलेले कर्ज हप्ते, FD/RD मुदतपूर्ती, आगामी वाढदिवस
   ========================================================= */
function daysFromNow(n){
  const d = new Date(); d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
function monthDay(dateStr){ return (dateStr||'').slice(5,10); } // 'MM-DD'

async function renderMember360(c, memberId){

  c.innerHTML = '<div class="empty">लोड होत आहे...</div>';
  try {
    const [{data:member, error:mErr}, {data:accounts}, {data:shareRows}] = await Promise.all([
      sbClient.from('members').select('id,member_no,name,father_husband_name,address_line1,address_line2,address_line3,pincode,phone,mobile,email,sex,birth_date,join_date,membership_status,branches(name),castes(name),occupations(name)').eq('id', memberId).single(),
      sbClient.from('accounts').select('id,account_no,current_balance,open_date,status,product_type,interest_rate,maturity_date').eq('member_id', memberId).order('open_date',{ascending:false}),
      sbClient.from('share_transactions').select('no_of_shares,share_value,txn_type,transfer_to_member_id,member_id').or(`member_id.eq.${memberId},transfer_to_member_id.eq.${memberId}`),
    ]);
    if (mErr || !member){ c.innerHTML = errBanner('सभासद सापडला नाही: ' + (mErr?.message||'')); return; }

    // भाग भांडवल — याच सभासदापुरतं (issue/transfer लॉजिक तेच, फक्त एका सभासदासाठी)
    let shares = 0, shareVal = 0;
    (shareRows||[]).forEach(r => {
      const sh = Number(r.no_of_shares||0), val = sh * Number(r.share_value||0);
      if (r.txn_type === 'issue' && r.member_id === memberId){ shares += sh; shareVal += val; }
      else if (r.txn_type !== 'issue'){

    const accList = accounts || [];

      </tr>`).join('');

      <td>${t.cd_flag==='C'?'<span class="tag savings">जमा</span>':'<span class="tag loan">काढणे</span>'}</td>
      <td>${fmtMoney(t.amount)}</td><td>${t.narration||''}</td></tr>`).join('');

    c.innerHTML = `
      <div class="panel">
        <div class="panel-head">
          <h3>${member.name} <span style="color:#8a8676;font-size:13px;font-weight:400;">| सभासद क्र: ${member.member_no}</span></h3>
          <button class="btn ghost small" onclick="render('members')">‹ यादीकडे परत</button>
          <button class="btn ghost small" onclick="showEditMemberForm('${member.id}')">✏️ संपादन करा</button>
          <button class="btn ghost small" onclick='showReceiptForm(${JSON.stringify({id:member.id, name:member.name, member_no:member.member_no})})'>🧾 पावती</button>
          <button class="btn ghost small" onclick="renderCertificatePrint('${member.id}','membership')">📜 सभासदत्व प्रमाणपत्र</button>
          <button class="btn ghost small" onclick="renderCertificatePrint('${member.id}','balance')">📜 शिल्लक प्रमाणपत्र</button>
        </div>
        <div class="form-grid" style="font-size:13.5px;">
          <div><b>वडील/पतीचे नाव:</b> ${member.father_husband_name||'-'}</div>
          <div><b>लिंग:</b> ${member.sex||'-'}</div>
          <div><b>जन्मतारीख:</b> ${member.birth_date||'-'}</div>
          <div><b>सभासद तारीख:</b> ${member.join_date||'-'}</div>

      <div class="panel" style="margin-top:14px;">

/* =========================================================
   जोखीम विश्लेषण (Risk Engine) — नियम-आधारित (Rule-based), खरं AI नाही
   नियम: थकीत हप्ते संख्या + किती दिवस थकीत यावरून Green/Yellow/Red
   ========================================================= */
/* =========================================================
   ऑडिट सूचना (Fraud/Audit Alerts) — नियम-आधारित तपासणी
   १. डुप्लिकेट व्यवहार (same खातं+रक्कम+दिनांक+प्रकार दोनदा/जास्त वेळा)
   २. बॅकडेटेड नोंदी (व्यवहार-दिनांक व नोंद-केल्याची-वेळ यात मोठा फरक)
   ========================================================= */
async function renderFraudAlerts(c){
  c.innerHTML = '<div class="empty">तपासत आहे (मोठा डेटा असल्यास वेळ लागू शकतो)...</div>';
  try {
    const from = daysFromNow(-90); // गेल्या ९० दिवसांतले व्यवहार तपासतो — संपूर्ण इतिहास तपासणं खूप जड जाईल
    const txns = await fetchAllRows('transactions',
      'id,txn_date,cd_flag,amount,narration,created_at,account_id,accounts!account_id(account_no,members!member_id(name))',
      q => q.gte('txn_date', from));

    // १. डुप्लिकेट — same account_id+amount+txn_date+cd_flag दोनदा किंवा जास्त
    const groups = {};
    txns.forEach(t => {
      const key = `${t.account_id}|${t.amount}|${t.txn_date}|${t.cd_flag}`;
      (groups[key] = groups[key]||[]).push(t);
    });
    const duplicateGroups = Object.values(groups).filter(g => g.length > 1);

    // २. बॅकडेटेड — नोंद-वेळ आणि व्यवहार-दिनांक यात ७+ दिवसांचा फरक
    const backdated = txns.filter(t => {
      if (!t.created_at || !t.txn_date) return false;
      const diffDays = Math.abs((new Date(t.created_at) - new Date(t.txn_date)) / 86400000);
      return diffDays > 7;
    });

    const dupRows = duplicateGroups.map(g => g.map(t=>`<tr><td>${t.accounts?.account_no||''}</td><td>${t.accounts?.members?.name||''}</td><td>${t.txn_date}</td><td>${t.cd_flag}</td><td>${fmtMoney(t.amount)}</td><td>${t.narration||''}</td></tr>`).join('')).join('');
    const backRows = backdated.map(t=>`<tr><td>${t.accounts?.account_no||''}</td><td>${t.accounts?.members?.name||''}</td><td>${t.txn_date}</td><td>${(t.created_at||'').slice(0,10)}</td><td>${fmtMoney(t.amount)}</td></tr>`).join('');

    // ३. मोठ्या रकमेचे संशयास्पद व्यवहार
    const LARGE_LIMIT = 200000;
    const large = txns.filter(t => Number(t.amount||0) > LARGE_LIMIT).sort((a,b)=> b.amount-a.amount);
    const largeRows = large.map(t=>`<tr><td>${t.accounts?.account_no||''}</td><td>${t.accounts?.members?.name||''}</td><td>${t.txn_date}</td><td>${t.cd_flag==='C'?'जमा':'काढणे'}</td><td>${fmtMoney(t.amount)}</td><td>${t.narration||''}</td></tr>`).join('');

    // ४. बॅलन्स विसंगती (SQL RPC — find_balance_mismatches)
    let mismatches = [];
    try { const { data } = await sbClient.rpc('find_balance_mismatches'); mismatches = data || []; } catch(e){ /* RPC नसेल तर रिकामं दाखवू */ }
    const misRows = mismatches.map(m=>`<tr><td>${m.account_no}</td><td>${m.member_name||''}</td><td>${fmtMoney(m.computed_balance)}</td><td>${fmtMoney(m.stored_balance)}</td><td style="color:${Math.abs(m.difference)>0?'#c0392b':'inherit'};font-weight:600;">${fmtMoney(m.difference)}</td></tr>`).join('');

    c.innerHTML = `
      <div class="banner warn">⚠ हे नियम-आधारित (rule-based) इशारे आहेत — फसवणूकच झाली असं नाही, फक्त पडताळणी करण्यासारखं आहे. डुप्लिकेट/बॅकडेटेड/मोठे व्यवहार फक्त गेल्या ९० दिवसांतलेच तपासले आहेत (संपूर्ण इतिहास तपासणं जड जाईल), बॅलन्स विसंगती मात्र सर्व सक्रिय खात्यांची आहे.</div>
      <div class="stat-row" style="margin-bottom:14px;">
        <div class="stat" style="border-top-color:#c0392b;"><div class="num">${duplicateGroups.length}</div><div class="lbl">डुप्लिकेट व्यवहार-गट</div></div>
        <div class="stat" style="border-top-color:#e6b800;"><div class="num">${large.length}</div><div class="lbl">मोठ्या रकमेचे व्यवहार (&gt;₹${fmtMoney(LARGE_LIMIT)})</div></div>
