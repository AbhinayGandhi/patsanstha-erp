/* =========================================================
   Analytics — Chart.js (मोफत, ओपन-सोर्स CDN) वापरून
   १. मासिक वाढ (नवीन खाती — बचत/ठेव विरुद्ध कर्ज) — शेवटचे १२ महिने
   २. शाखानिहाय तुलना — ठेवी विरुद्ध कर्ज
   ३. प्रॉडक्ट-वार वितरण (खात्यांची संख्या)
   ========================================================= */
let ANALYTICS_CHARTS = [];
function destroyAnalyticsCharts(){ ANALYTICS_CHARTS.forEach(ch => ch.destroy()); ANALYTICS_CHARTS = []; }

async function renderAnalytics(c){
  destroyAnalyticsCharts();
  c.innerHTML = '<div class="empty">डेटा गोळा करत आहे... (मोठा डेटा असल्यास थोडा वेळ लागू शकतो)</div>';
  try {
    const accounts = await fetchAllRows('accounts', 'product_type,open_date,current_balance,status,branch_id,branches(name)');

    // १. मासिक वाढ — शेवटचे १२ महिने, नवीन खाती उघडल्याची संख्या (ठेव-प्रकार वि. कर्ज)
    const months = [];
    for (let i=11; i>=0; i--){
      const d = new Date(); d.setMonth(d.getMonth()-i);
      months.push(d.toISOString().slice(0,7)); // YYYY-MM
    }
    const depositCounts = months.map(m => accounts.filter(a => (a.open_date||'').startsWith(m) && ['savings','fd','rd','pigmy'].includes(a.product_type)).length);
    const loanCounts = months.map(m => accounts.filter(a => (a.open_date||'').startsWith(m) && a.product_type === 'loan').length);

    // २. शाखानिहाय तुलना — ठेवी वि. कर्ज (सक्रिय खात्यांची शिल्लक)
    const branchMap = {};
    accounts.filter(a=>a.status==='active').forEach(a => {
      const bname = a.branches?.name || 'अज्ञात शाखा';
      if (!branchMap[bname]) branchMap[bname] = { deposit:0, loan:0 };
      const bal = Math.abs(Number(a.current_balance||0));
      if (a.product_type === 'loan') branchMap[bname].loan += bal;
      else if (['savings','fd','rd','pigmy'].includes(a.product_type)) branchMap[bname].deposit += bal;
    });
    const branchNames = Object.keys(branchMap);
    const branchDeposit = branchNames.map(n => branchMap[n].deposit);
    const branchLoan = branchNames.map(n => branchMap[n].loan);

    // ३. प्रॉडक्ट-वार वितरण (सक्रिय खात्यांची संख्या)
    const prodLabels = {savings:'बचत', fd:'FD', rd:'RD', loan:'कर्ज', pigmy:'पिग्मी'};
    const prodCounts = {};
    accounts.filter(a=>a.status==='active').forEach(a => { prodCounts[a.product_type] = (prodCounts[a.product_type]||0)+1; });

    c.innerHTML = `
      <div class="panel">
        <h3>मासिक वाढ — नवीन खाती (शेवटचे १२ महिने)</h3>
        <canvas id="chart-monthly" height="90"></canvas>
      </div>
      <div class="panel" style="margin-top:16px;">
        <h3>शाखानिहाय तुलना — ठेवी वि. कर्ज (सक्रिय शिल्लक)</h3>
        <canvas id="chart-branch" height="100"></canvas>
      </div>
      <div class="panel" style="margin-top:16px;">
        <h3>प्रॉडक्ट-वार खाती वितरण</h3>
        <div style="max-width:340px;margin:0 auto;"><canvas id="chart-product"></canvas></div>
      </div>
    `;

    const chart1 = new Chart(document.getElementById('chart-monthly'), {
      type: 'line',
      data: { labels: months, datasets: [
        { label: 'नवीन ठेव-प्रकार खाती', data: depositCounts, borderColor:'#2F6F4E', backgroundColor:'rgba(47,111,78,.15)', tension:.3, fill:true },
        { label: 'नवीन कर्ज खाती', data: loanCounts, borderColor:'#B54834', backgroundColor:'rgba(181,72,52,.15)', tension:.3, fill:true },
      ]},
      options: { responsive:true, plugins:{ legend:{ position:'bottom' } }, scales:{ y:{ beginAtZero:true, ticks:{ precision:0 } } } }
    });
    const chart2 = new Chart(document.getElementById('chart-branch'), {
      type: 'bar',
      data: { labels: branchNames, datasets: [
        { label: 'ठेवी', data: branchDeposit, backgroundColor:'#2F6F4E' },
        { label: 'कर्ज', data: branchLoan, backgroundColor:'#B54834' },
      ]},
      options: { responsive:true, plugins:{ legend:{ position:'bottom' } }, scales:{ y:{ beginAtZero:true } } }
    });
    const chart3 = new Chart(document.getElementById('chart-product'), {
      type: 'doughnut',
      data: { labels: Object.keys(prodCounts).map(k=>prodLabels[k]||k), datasets: [
        { data: Object.values(prodCounts), backgroundColor:['#2F6F4E','#C99A2E','#1B2A4A','#B54834','#8a8676'] },
      ]},
      options: { responsive:true, plugins:{ legend:{ position:'bottom' } } }
    });
    ANALYTICS_CHARTS = [chart1, chart2, chart3];
  } catch(e){ c.innerHTML = errBanner('Analytics त्रुटी: ' + e.message); }
}

async function renderRiskEngine(c){
  c.innerHTML = '<div class="empty">जोखीम विश्लेषण करत आहे (मोठा डेटा असल्यास वेळ लागू शकतो)...</div>';
  try {
    const today = daysFromNow(0);
    const installments = await fetchAllRows('loan_installments',
      'account_id,due_date,principal_due,interest_due,principal_paid,interest_paid');
    const byAccount = {};
    installments.forEach(i => {
      const due = Number(i.principal_due||0)+Number(i.interest_due||0);
      const paid = Number(i.principal_paid||0)+Number(i.interest_paid||0);
      const remaining = due - paid;
      if (remaining > 1 && i.due_date < today){
        if (!byAccount[i.account_id]) byAccount[i.account_id] = { overdueCount:0, minDueDate:i.due_date, overdueAmt:0 };
        const b = byAccount[i.account_id];
        b.overdueCount += 1;
        b.overdueAmt += remaining;
        if (i.due_date < b.minDueDate) b.minDueDate = i.due_date;
      }
    });
    const loanAccounts = await fetchAllRows('accounts',
      'id,account_no,current_balance,status,open_date,members!member_id(name,mobile)',
      q => q.eq('product_type','loan').eq('status','active'));
    const daysBetween = (d1,d2) => Math.round((new Date(d2) - new Date(d1)) / 86400000);
    const scored = loanAccounts.map(a => {
      const risk = byAccount[a.id];
      let level = 'हिरवा', maxDaysOverdue = 0, overdueCount = 0, overdueAmt = 0;
      if (risk){
        overdueCount = risk.overdueCount; overdueAmt = risk.overdueAmt;
        maxDaysOverdue = daysBetween(risk.minDueDate, today);
        if (overdueCount >= 3 || maxDaysOverdue > 90) level = 'लाल';
        else level = 'पिवळा';
      }
      return { ...a, level, overdueCount, overdueAmt, maxDaysOverdue };
    });
    const red = scored.filter(s=>s.level==='लाल');
    const yellow = scored.filter(s=>s.level==='पिवळा');
    const green = scored.filter(s=>s.level==='हिरवा');
    const rowsFor = (arr) => arr.length ? `<table class="data-table"><thead><tr><th>खाते क्र</th><th>सभासद</th><th>मोबाईल</th><th>थकीत हप्ते</th><th>जास्तीत जास्त दिवस थकीत</th><th>थकीत रक्कम</th><th>बाकी शिल्लक</th></tr></thead><tbody>${
      arr.sort((a,b)=>b.overdueAmt-a.overdueAmt).map(a=>`<tr><td>${a.account_no}</td><td>${a.members?.name||''}</td><td>${a.members?.mobile||''}</td><td>${a.overdueCount}</td><td>${a.maxDaysOverdue}</td><td>${fmtMoney(a.overdueAmt)}</td><td>${fmtMoney(Math.abs(Number(a.current_balance||0)))}</td></tr>`).join('')
    }</tbody></table>` : '<p class="empty" style="padding:8px;">काहीही नाही.</p>';
    c.innerHTML = `
      <div class="banner warn">⚠ हे नियम-आधारित (rule-based) वर्गीकरण आहे, खरं AI/मशीन-लर्निंग मॉडेल नाही. नियम: ३+ थकीत हप्ते किंवा ९०+ दिवस थकीत = 🔴 लाल; १-२ थकीत हप्ते = 🟡 पिवळा; काहीही थकीत नाही = 🟢 हिरवा.</div>
      <div class="stat-row" style="margin:14px 0;">
        <div class="stat" style="border-top-color:#c0392b"><div class="num">${red.length}</div><div class="lbl">🔴 लाल (उच्च जोखीम)</div></div>
        <div class="stat" style="border-top-color:#d4a72c"><div class="num">${yellow.length}</div><div class="lbl">🟡 पिवळा (मध्यम)</div></div>
        <div class="stat" style="border-top-color:var(--green)"><div class="num">${green.length}</div><div class="lbl">🟢 हिरवा (सुरक्षित)</div></div>
      </div>
      <div class="panel"><h3>🔴 लाल — तातडीने लक्ष द्या (${red.length})</h3>${rowsFor(red)}</div>
      <div class="panel" style="margin-top:14px;"><h3>🟡 पिवळा — लक्ष ठेवा (${yellow.length})</h3>${rowsFor(yellow)}</div>
    `;
  } catch(e){ c.innerHTML = errBanner('जोखीम विश्लेषण त्रुटी: ' + e.message); }
}

async function fillNameEnglish(){
  const btn = document.getElementById('btn-fill-nameen');
  const statusEl = document.getElementById('nameen-status');
  btn.disabled = true; btn.textContent = 'तपासत आहे...';
  const members = await fetchAllRows('members', 'id,name,name_en', q => q.is('name_en', null));
  if (!members.length){ statusEl.innerHTML = '<div class="banner ok">✓ सगळ्या सभासदांचं इंग्रजी नाव आधीच भरलेलं आहे.</div>'; btn.disabled=false; btn.textContent='भरण्यास सुरुवात करा'; return; }
  statusEl.textContent = `${members.length} सभासदांचं इंग्रजी नाव भरत आहे... (काही मिनिटं लागू शकतात)`;
  let done = 0;
  for (const m of members){
    const en = devanagariToRoman(m.name);
    const { error } = await sbClient.from('members').update({ name_en: en }).eq('id', m.id);
    if (!error) done++;
    if (done % 25 === 0) statusEl.textContent = `${done} / ${members.length} झाले...`;
  }
  statusEl.innerHTML = `<div class="banner ok">✓ ${done} / ${members.length} सभासदांचं इंग्रजी नाव भरलं.</div>`;
  btn.disabled = false; btn.textContent = 'भरण्यास सुरुवात करा';
}

async function scanNameCorruption(){
  const el = document.getElementById('name-scan-result');
  el.innerHTML = '<div class="empty">सगळे सभासद तपासत आहे...</div>';
  const members = await fetchAllRows('members', 'id,member_no,name');
  const danglingHalant = /्(?=$|[\s()/,.\-])/;   // हलंत त्यानंतर काहीच नाही किंवा जागा/चिन्ह
  const leadingMatra = /(^|\s)[ीिुूेैोौंःँ]/;     // शब्दाच्या सुरुवातीला एकटी मात्रा
  const suspects = members.filter(m => {
    const n = m.name || '';
    return danglingHalant.test(n) || leadingMatra.test(n);
  });
  if (!suspects.length){ el.innerHTML = '<div class="banner ok">✓ अशी कोणतीही तुटलेली नोंद सापडली नाही.</div>'; return; }
  const rows = suspects.map(m => `
    <tr>
      <td>${m.member_no}</td>
      <td><input type="text" class="name-fix-input" data-id="${m.id}" value="${(m.name||'').replace(/"/g,'&quot;')}" style="width:260px;"></td>
      <td><button class="btn ghost small" onclick="applyNameFix('${m.id}',this)">अद्यतनित करा</button></td>
    </tr>`).join('');
  el.innerHTML = `
    <div class="banner warn">${suspects.length} संभाव्य तुटलेली नावं सापडली.</div>
    <button class="btn ghost small" id="btn-dl-names">यादी CSV म्हणून डाउनलोड करा</button>
    <p style="color:#777;font-size:12px;margin-top:10px;">डाउनलोड झालेल्या फाईलमधला <b>"दुरुस्त_नाव"</b> कॉलम भरून (बाहेरच्या टूल/मॅन्युअली) परत इथे अपलोड करा — फक्त तो कॉलम भरलेल्या ओळीच अपडेट होतील, सभासद क्रमांकावरून जुळवून:</p>
    <input type="file" id="name-fix-upload" accept=".csv" style="margin:6px 0;">
    <div id="name-fix-upload-result"></div>
    <table class="data-table" style="margin-top:10px;"><thead><tr><th>सभासद क्र</th><th>नाव (मॅन्युअल दुरुस्तीसाठी)</th><th></th></tr></thead><tbody>${rows}</tbody></table>
  `;
  document.getElementById('btn-dl-names').addEventListener('click', () => {
    const header = ['सभासद_क्र','सध्याचे_नाव','दुरुस्त_नाव'];
    const lines = [header.join(',')];
    suspects.forEach(m => lines.push([m.member_no, `"${(m.name||'').replace(/"/g,'""')}"`, ''].join(',')));
    const blob = new Blob(['\uFEFF'+lines.join('\n')], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'tutlele_navache_yadi.csv'; a.click();
  });
  document.getElementById('name-fix-upload').addEventListener('change', async (ev) => {
    const file = ev.target.files[0];
    if (!file) return;
    const resEl = document.getElementById('name-fix-upload-result');
    resEl.innerHTML = '<div class="empty">वाचत आहे...</div>';
    const text = await file.text();
    const rowsCsv = parseCSV(text);
    const header = rowsCsv[0].map(h => (h||'').trim());
    const idxNo = header.indexOf('सभासद_क्र');
    const idxNew = header.indexOf('दुरुस्त_नाव');
    if (idxNo === -1 || idxNew === -1){
      resEl.innerHTML = '<div class="banner warn">फाईलमध्ये "सभासद_क्र" व "दुरुस्त_नाव" हे कॉलम सापडले नाहीत — मूळ डाउनलोड केलेली फाईलच वापरा (हेडर बदलू नका).</div>';
      return;
    }
    const dataRows = rowsCsv.slice(1).map(r => ({ member_no: (r[idxNo]||'').trim(), newName: (r[idxNew]||'').trim() })).filter(r => r.member_no && r.newName);
    if (!dataRows.length){ resEl.innerHTML = '<div class="banner warn">"दुरुस्त_नाव" भरलेली एकही ओळ सापडली नाही.</div>'; return; }
    resEl.innerHTML = `${dataRows.length} ओळी अपडेट होत आहेत...`;
    let done = 0, failed = [];
    for (const r of dataRows){
      const { error } = await sbClient.from('members').update({ name:r.newName }).eq('member_no', r.member_no);
      if (error) failed.push(r.member_no); else done++;
    }
    resEl.innerHTML = `<div class="banner ${failed.length?'warn':'ok'}">✓ ${done} नोंदी अपडेट झाल्या.${failed.length ? ' अयशस्वी सभासद क्र: '+failed.join(', ') : ''}</div>`;
  });
}

async function applyNameFix(id, btn){
  const input = document.querySelector(`.name-fix-input[data-id="${id}"]`);
  const newVal = input.value.trim();
  if (!newVal){ alert('नाव रिकामं चालणार नाही.'); return; }
  btn.disabled = true; btn.textContent = 'होत आहे...';
  const { error } = await sbClient.from('members').update({ name:newVal }).eq('id', id);
  if (error){ btn.textContent = '✗ चूक'; btn.title = error.message; }
  else { btn.textContent = '✓ झालं'; input.disabled = true; }
}

async function applyCleanupFix(tbl, id, btn){
  const input = document.querySelector(`input[data-tbl="${tbl}"][data-id="${id}"]`);
  const newVal = input.value.trim();
  if (!newVal){ alert('रिकामं नाव चालणार नाही.'); return; }
  btn.disabled = true; btn.textContent = 'होत आहे...';
  const { error } = await sbClient.from(tbl).update({ name: newVal }).eq('id', id);
  if (error){ btn.textContent = '✗ चूक: ' + error.message; }
  else { btn.textContent = '✓ झालं'; input.disabled = true; }
}

async function scanSexMismatch(){
  const el = document.getElementById('sex-scan-result');
  el.innerHTML = '<div class="empty">सगळे सभासद तपासत आहे (मोठा डेटा असल्यास थोडा वेळ लागेल)...</div>';
  const members = await fetchAllRows('members', 'id,member_no,name,sex');
  const pattern = /(सौ\.?|श्रीमती|कुमारी|कु\.)/;
  const suspects = members.filter(m => m.sex === 'M' && pattern.test(m.name||''));
  if (!suspects.length){ el.innerHTML = '<div class="banner ok">✓ अशी कोणतीही संशयास्पद नोंद सापडली नाही.</div>'; return; }
  const rows = suspects.map(m => `
    <tr>
      <td><input type="checkbox" class="sex-fix-chk" data-id="${m.id}" checked></td>
      <td>${m.member_no}</td><td>${m.name}</td><td>M → F</td>
    </tr>`).join('');
  el.innerHTML = `
    <div class="banner warn">${suspects.length} संशयास्पद नोंदी सापडल्या. तपासून, नको असलेल्या अनचेक करून, मग खालचं बटण दाबा.</div>
    <table class="data-table"><thead><tr><th></th><th>सभासद क्र</th><th>नाव</th><th>बदल</th></tr></thead><tbody>${rows}</tbody></table>
    <button class="btn" id="btn-apply-sex-fix" style="margin-top:10px;">निवडलेले अपडेट करा</button>
    <div id="sex-fix-status" style="margin-top:8px;"></div>
  `;
  document.getElementById('btn-apply-sex-fix').addEventListener('click', async () => {
    const ids = Array.from(document.querySelectorAll('.sex-fix-chk:checked')).map(chk => chk.dataset.id);
    const statusEl = document.getElementById('sex-fix-status');
    statusEl.textContent = `${ids.length} नोंदी अपडेट होत आहेत...`;
    let done = 0;
    for (const id of ids){
      const { error } = await sbClient.from('members').update({ sex:'F' }).eq('id', id);
      if (!error) done++;
    }
    statusEl.innerHTML = `<div class="banner ok">✓ ${done} / ${ids.length} नोंदी अपडेट झाल्या.</div>`;
  });
}

        हे बटण त्याला पर्याय नाही — फक्त महत्त्वाचा मास्टर डेटा (सभासद, खाती, स्टाफ, GL, इ.) एका JSON फाईलमध्ये
        डाउनलोड करून स्वतःकडे (Google Drive/Pendrive) जपून ठेवण्यासाठी अतिरिक्त सुरक्षा आहे.
        <b>पूर्ण व्यवहार-इतिहास (transactions/journal_entries) यात समाविष्ट नाही</b> — तो खूप मोठा असल्याने ब्राउझरमध्ये आणणं जड जाईल; त्यासाठी Supabase च्या बॅकअपवरच अवलंबून राहा.
      </p>
      <button class="btn gold" id="btn-manual-backup">📥 मास्टर डेटा बॅकअप डाउनलोड करा (JSON)</button>
      <div id="backup-status" style="margin-top:10px;"></div>
    </div>
    <div class="panel" style="margin-top:14px;">
      <h3>🔐 द्वि-घटक पडताळणी (2FA)</h3>
      <p style="color:#777;font-size:12.5px;">Google Authenticator / Authy सारखं ॲप वापरून, पासवर्डसोबत ६-अंकी कोडचीही पडताळणी — खाते जास्त सुरक्षित होते.</p>
      <div id="twofa-status">तपासत आहे...</div>
    </div>
    <div class="panel" style="margin-top:14px;"><h3>पुढील टप्पे</h3>
      <ul><li>Transactions / Day Book</li><li>Loan installment auto-schedule</li><li>Reports</li></ul>
    </div>
  `;
  document.getElementById('btn-manual-backup').addEventListener('click', runManualBackup);
  render2FAStatus();
}

async function render2FAStatus(){
  const el = document.getElementById('twofa-status');
  try {
    const { data, error } = await sbClient.auth.mfa.listFactors();
    if (error) throw error;
    const verified = (data.totp || []).find(f => f.status === 'verified');
    if (verified){
      el.innerHTML = `
        <div class="banner ok">✓ 2FA चालू आहे — पुढच्या लॉगिनपासून ६-अंकी कोड विचारला जाईल.</div>
        <button class="btn ghost small" id="btn-disable-2fa">2FA बंद करा</button>
      `;
      document.getElementById('btn-disable-2fa').addEventListener('click', async () => {
        if (!confirm('खरंच 2FA बंद करायचं आहे का? यामुळे खात्याची सुरक्षा कमी होईल.')) return;
        await sbClient.auth.mfa.unenroll({ factorId: verified.id });
        render2FAStatus();
      });
    } else {
      el.innerHTML = `<button class="btn gold" id="btn-enable-2fa">2FA सुरू करा</button>`;
      document.getElementById('btn-enable-2fa').addEventListener('click', start2FAEnrollment);
    }
  } catch(e){ el.innerHTML = errBanner('2FA स्थिती तपासताना त्रुटी: ' + e.message); }
}

async function start2FAEnrollment(){
  const el = document.getElementById('twofa-status');
  el.innerHTML = '<div class="empty">QR कोड तयार करत आहे...</div>';
  try {
    const { data, error } = await sbClient.auth.mfa.enroll({ factorType: 'totp' });
    if (error) throw error;
    const factorId = data.id;
    const qrUri = data.totp.qr_code;
    el.innerHTML = `
      <p style="font-size:13px;">Google Authenticator / Authy ॲपने हा QR स्कॅन करा, नंतर ॲपमध्ये दिसणारा ६-अंकी कोड खाली टाका:</p>
      <div id="twofa-qr" style="margin:10px 0;"></div>
      <p style="font-size:11px;color:#999;">QR स्कॅन करता येत नसेल तर हा कोड मॅन्युअली टाका: <code>${data.totp.secret}</code></p>
      <input type="text" id="twofa-verify-code" placeholder="६-अंकी कोड" maxlength="6" style="padding:8px;border:1px solid #d8d8d8;border-radius:6px;width:140px;">
      <button class="btn gold small" id="btn-verify-2fa">पडताळा व सुरू करा</button>
      <div class="err" id="twofa-enroll-err" style="color:#b23b3b;font-size:12.5px;margin-top:8px;"></div>
    `;
    document.getElementById('twofa-qr').innerHTML = qrUri; // Supabase आधीच तयार SVG QR पाठवतं, तेच थेट दाखवतो
    document.getElementById('btn-verify-2fa').addEventListener('click', async () => {
      const code = document.getElementById('twofa-verify-code').value.trim();
      const errEl = document.getElementById('twofa-enroll-err');
      if (!code || code.length !== 6){ errEl.textContent = '६-अंकी कोड बरोबर टाका.'; return; }
      try {
        const { data: chal, error: chalErr } = await sbClient.auth.mfa.challenge({ factorId });
        if (chalErr) throw chalErr;
        const { error: verifyErr } = await sbClient.auth.mfa.verify({ factorId, challengeId: chal.id, code });
        if (verifyErr) throw verifyErr;
        render2FAStatus();
      } catch(e){ errEl.textContent = 'चूक: ' + e.message; }
    });
  } catch(e){ el.innerHTML = errBanner('2FA सुरू करताना त्रुटी: ' + e.message); }
}

async function runManualBackup(){
  const btn = document.getElementById('btn-manual-backup');
  const statusEl = document.getElementById('backup-status');
  btn.disabled = true; btn.textContent = 'तयार करत आहे... (मोठा डेटा असल्यास वेळ लागू शकतो)';
  const TABLES = ['members','accounts','staff','staff_roles','gl_accounts','branches','castes','occupations','share_transactions','share_certificates'];
  const backup = { generated_at: new Date().toISOString(), generated_by: CURRENT_STAFF?.name || null, tables: {} };
  try {
    for (const tbl of TABLES){
      statusEl.textContent = `${tbl} टेबल आणत आहे...`;
      try { backup.tables[tbl] = await fetchAllRows(tbl, '*'); }
      catch(e){ backup.tables[tbl] = { error: e.message }; }
    }
    const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `master_data_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    const counts = Object.entries(backup.tables).map(([k,v])=> `${k}: ${Array.isArray(v)?v.length:'त्रुटी'}`).join(', ');
    statusEl.innerHTML = `<div class="banner ok">✓ बॅकअप डाउनलोड झाला. (${counts})</div>`;
  } catch(e){
    statusEl.innerHTML = `<div class="banner err">✗ त्रुटी: ${e.message}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = '📥 मास्टर डेटा बॅकअप डाउनलोड करा (JSON)';
  }
}

/* ---------- लॉगिन / भूमिका (Auth) ---------- */
let CURRENT_STAFF = null; // { id, name, role, branch_id }

function showLoginScreen(){
  document.getElementById('login-screen').classList.remove('hidden');
  document.querySelector('.shell').style.display = 'none';
}
function hideLoginScreen(){
  document.getElementById('login-screen').classList.add('hidden');
  document.querySelector('.shell').style.display = '';
}

async function fetchStaffProfile(authUserId){
  try {
    const { data, error } = await sbClient
      .from('staff')
      .select('id,name,branch_id,is_active,staff_roles(name)')
      .eq('auth_user_id', authUserId)
      .maybeSingle();
    if (error || !data) return null;
    return { id:data.id, name:data.name, role: data.staff_roles?.name || null, branch_id:data.branch_id, is_active:data.is_active };
  } catch(e){ return null; }
}

function renderStaffBadge(){
  const el = document.getElementById('staff-badge');
  if (!CURRENT_STAFF){ el.style.display='none'; return; }
  el.style.display = 'flex';
  el.innerHTML = `${CURRENT_STAFF.name} <span class="role">${CURRENT_STAFF.role || 'भूमिका नाही'}</span> <button onclick="doLogout()">लॉगआउट</button>`;
}

async function doLogout(){
  try { await sbClient.auth.signOut(); } catch(e){}
  CURRENT_STAFF = null;
  showLoginScreen();
}

/* ---------- सेशन टाइमआउट — २० मिनिटं निष्क्रिय राहिल्यास आपोआप लॉगआउट ---------- */
const IDLE_TIMEOUT_MS = 20 * 60 * 1000; // २० मिनिटं
let idleTimer = null;
function resetIdleTimer(){
  if (!CURRENT_STAFF) return; // लॉगिनच नसेल तर टायमरची गरज नाही
  if (idleTimer) clearTimeout(idleTimer);
  idleTimer = setTimeout(async () => {
    await doLogout();
    alert('२० मिनिटं निष्क्रियतेमुळे सुरक्षिततेसाठी आपोआप लॉगआउट झालात — कृपया पुन्हा लॉगिन करा.');
  }, IDLE_TIMEOUT_MS);
}
['mousemove','keydown','click','scroll','touchstart'].forEach(evt =>
  document.addEventListener(evt, resetIdleTimer, { passive: true })
);

async function handleLoginSubmit(ev){
  ev.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';
  btn.disabled = true; btn.textContent = 'तपासत आहे...';
  try {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
    if (error) { errEl.textContent = 'लॉगिन अयशस्वी: चुकीचा ईमेल/पासवर्ड.'; return; }

    // 2FA सुरू असेल तर (aal1 → aal2 आवश्यक असेल तर) आधी ६-अंकी कोड मागतो
    const { data: aalData } = await sbClient.auth.mfa.getAuthenticatorAssuranceLevel();
    if (aalData && aalData.nextLevel === 'aal2' && aalData.currentLevel !== 'aal2'){
      showMfaChallengeForm();
      return;
    }
    await completeLoginAfterAuth();
  } catch(e){
    errEl.textContent = 'अनपेक्षित एरर: ' + e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'लॉगिन करा';
  }
}

function showMfaChallengeForm(){
  document.getElementById('login-form').innerHTML = `
    <label>Authenticator ॲपमधला ६-अंकी कोड</label>
    <input type="text" id="mfa-code" maxlength="6" autocomplete="one-time-code" required>
    <button type="submit" id="login-btn">पडताळा</button>
    <div class="login-err" id="login-err"></div>
  `;
  document.getElementById('login-form').onsubmit = async (ev) => {
    ev.preventDefault();
    const errEl = document.getElementById('login-err');
    const code = document.getElementById('mfa-code').value.trim();
    if (!code || code.length !== 6){ errEl.textContent = '६-अंकी कोड बरोबर टाका.'; return; }
    try {
      const { data: factors } = await sbClient.auth.mfa.listFactors();
      const factor = (factors.totp || []).find(f => f.status === 'verified');
      if (!factor){ errEl.textContent = '2FA फॅक्टर सापडला नाही.'; return; }
      const { data: chal, error: chalErr } = await sbClient.auth.mfa.challenge({ factorId: factor.id });
      if (chalErr) throw chalErr;
      const { error: verifyErr } = await sbClient.auth.mfa.verify({ factorId: factor.id, challengeId: chal.id, code });
      if (verifyErr) throw verifyErr;
      await completeLoginAfterAuth();
    } catch(e){ errEl.textContent = 'चूक: ' + e.message; }
  };
}

async function completeLoginAfterAuth(){
  const errEl = document.getElementById('login-err');
  const { data: { user } } = await sbClient.auth.getUser();
  const profile = await fetchStaffProfile(user.id);
  if (!profile){
    if (errEl) errEl.textContent = 'हा युजर लॉगिन झाला, पण staff यादीत सापडला नाही — Admin शी संपर्क करा.';
    await sbClient.auth.signOut();
    return;
  }
  if (!profile.is_active){
    if (errEl) errEl.textContent = 'हे खातं निष्क्रिय (inactive) केलं आहे — Admin शी संपर्क करा.';
    await sbClient.auth.signOut();
    return;
  }
  CURRENT_STAFF = profile;
  renderStaffBadge();
  hideLoginScreen();
  resetIdleTimer();
  render('dashboard');
}

/* init */
(async function init(){
  await initSupabase();
  document.getElementById('login-form').addEventListener('submit', handleLoginSubmit);
  if (!sbClient){ showLoginScreen(); return; } // Supabase जोडणीच झाली नाही तर लॉगिनही शक्य नाही
  try {
    const { data: { session } } = await sbClient.auth.getSession();
    if (session){
      const profile = await fetchStaffProfile(session.user.id);
      if (profile && profile.is_active){
        CURRENT_STAFF = profile;
        renderStaffBadge();
        hideLoginScreen();
        resetIdleTimer();
        render('dashboard');
        return;
      }
    }
  } catch(e){ /* सेशन तपासताना एरर आली तरी लॉगिन स्क्रीनवरच थांबवायचं */ }
  showLoginScreen();
})();
</script>
