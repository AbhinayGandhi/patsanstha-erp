<style>
  :root{ --navy:#1B2A4A; --gold:#C99A2E; --cream:#F7F5F0; --green:#2F6F4E; --rust:#B54834; --slate:#33363D; --border:#E3DFD5; --card:#FFFFFF; }
  [data-theme="dark"]{ --navy:#2A3D63; --gold:#D9B24F; --cream:#1A1D24; --green:#4A9670; --rust:#D8664A; --slate:#E8E6E0; --border:#3A3E48; --card:#242730; }
  [data-theme="dark"] .wrap, [data-theme="dark"] .card{ background:var(--card); }
  [data-theme="dark"] input, [data-theme="dark"] select{ background:#1F222B; color:var(--slate); border-color:var(--border); }
  .theme-toggle-btn{ background:none; border:1px solid rgba(255,255,255,.4); border-radius:6px; padding:4px 10px; cursor:pointer; color:#fff; font-size:13px; margin-left:8px; }
  *{box-sizing:border-box;}
  body{ margin:0; font-family:'Noto Sans Devanagari', sans-serif; background:var(--cream); color:var(--slate); min-height:100vh; }
  h1,h2,h3{ font-family:'Tiro Devanagari Marathi', serif; }
  .wrap{ max-width:480px; margin:0 auto; min-height:100vh; background:var(--card); box-shadow:0 0 24px rgba(0,0,0,.06); }
  .head{ background:var(--navy); color:#fff; padding:18px 20px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:5; }
  .seal{ width:34px;height:34px;border-radius:50%; background:radial-gradient(circle at 30% 30%, var(--gold), #8f701f); display:flex;align-items:center;justify-content:center; font-weight:700; color:var(--navy); font-size:16px; flex-shrink:0; }
  .head h1{ font-size:17px; margin:0; }
  .head small{ display:block; font-size:11px; opacity:.7; font-family:'Noto Sans Devanagari'; }
  .head .logout{ margin-left:auto; background:none; border:1px solid rgba(255,255,255,.4); color:#fff; padding:5px 10px; border-radius:6px; font-size:12px; cursor:pointer; }
  .content{ padding:20px; }
  .card{ background:#fff; border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:14px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12.5px; color:#666; margin-bottom:5px; }
  .field input{ width:100%; padding:11px 12px; border:1px solid #d8d8d8; border-radius:8px; font-size:16px; box-sizing:border-box; }
  .btn{ width:100%; padding:12px; border:none; border-radius:8px; background:var(--navy); color:#fff; font-size:15px; font-weight:600; cursor:pointer; }
  .btn:disabled{ opacity:.6; }
  .btn.gold{ background:var(--gold); color:var(--navy); }
  .btn.ghost{ background:none; border:1px solid var(--border); color:var(--navy); }
  .link-btn{ background:none; border:none; color:var(--navy); text-decoration:underline; font-size:13px; cursor:pointer; padding:0; margin-top:10px; display:block; text-align:center; width:100%; }
  .err{ color:#b23b3b; font-size:12.5px; margin-top:8px; min-height:16px; }
  .ok{ color:var(--green); font-size:12.5px; margin-top:8px; }
  .stat{ text-align:center; padding:14px 0; }
  .stat .num{ font-size:22px; font-weight:700; color:var(--navy); }
  .stat .lbl{ font-size:12px; color:#8a8676; }
  .acc-row{ display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); }
  .acc-row:last-child{ border-bottom:none; }
  .acc-row .no{ font-weight:600; font-size:14px; }
  .acc-row .type{ font-size:11.5px; color:#8a8676; }
  .acc-row .bal{ font-weight:700; color:var(--navy); font-size:15px; }
  .txn-row{ display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .txn-row:last-child{ border-bottom:none; }
  .txn-row .c{ color:var(--green); font-weight:600; }
  .txn-row .d{ color:var(--rust); font-weight:600; }
  .empty{ text-align:center; color:#999; padding:30px 0; font-size:13.5px; }
  .hidden{ display:none; }
  .tabbar{ display:flex; border-top:1px solid var(--border); position:sticky; bottom:0; background:#fff; overflow-x:auto; }
  .tabbar button{ flex:0 0 auto; min-width:78px; border:none; background:none; padding:10px 0; font-size:12px; color:#8a8676; cursor:pointer; }
  .tabbar button.active{ color:var(--navy); font-weight:700; }
  @media print{
    .head, .tabbar{ display:none !important; }
    .wrap{ box-shadow:none; max-width:100%; }
    body{ background:#fff; }
  }
</style>

<script>

const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlbWhqcmdvd3J6aWdkbnZpamtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0Mzk0ODIsImV4cCI6MjA5OTAxNTQ4Mn0.Yv80XtocxepssWTp0mtTTyfdvoNiSwv2ofvGjU6PmxU';

/* ---------- डार्क मोड ---------- */
(function initTheme(){
  const saved = localStorage.getItem('portal_theme');
  if (saved === 'dark') document.documentElement.setAttribute('data-theme','dark');

document.getElementById('theme-toggle-btn').addEventListener('click', () => {

/* ---------- सेशन टाइमआउट — १० मिनिटं निष्क्रियतेनंतर आपोआप लॉगआउट ---------- */
const IDLE_TIMEOUT_MS = 10 * 60 * 1000;
let idleTimer = null;
function resetIdleTimer(){
  if (!CURRENT_MEMBER) return;
  if (idleTimer) clearTimeout(idleTimer);
  idleTimer = setTimeout(async () => {
    await sb.auth.signOut();
    CURRENT_MEMBER = null;
    logoutBtn.classList.add('hidden');
    document.getElementById('tabbar').classList.add('hidden');
    renderLogin();
    alert('१० मिनिटं निष्क्रियतेमुळे सुरक्षिततेसाठी आपोआप लॉगआउट झालात.');
  }, IDLE_TIMEOUT_MS);
}
['mousemove','keydown','click','scroll','touchstart'].forEach(evt =>
  document.addEventListener(evt, resetIdleTimer, { passive: true })
);

/* ---------- लॉगिन स्क्रीन — मोबाईल नंबर वापरून ---------- */
function renderLogin(err){
  c.innerHTML = `
    <div class="card">

/* ---------- पावती सत्यापन — लॉगिनशिवाय, सार्वजनिक ---------- */
function renderReceiptVerify(){
  c.innerHTML = `
    <div class="card">
      <h2 style="text-align:center;margin-top:0;">✓ पावती सत्यापन</h2>
      <p style="font-size:12.5px;color:#777;text-align:center;">पावतीवरचा पावती-क्रमांक टाकून ती खरी आहे का तपासा.</p>
      <div class="field"><label>पावती क्रमांक</label><input id="rv-no" placeholder="उदा. R20260720-123"></div>
      <button class="btn gold" id="rv-check-btn">तपासा</button>
      <div id="rv-result" style="margin-top:14px;"></div>
    </div>
    <button class="link-btn" id="go-back-login">‹ लॉगिनकडे परत</button>
  `;
  document.getElementById('go-back-login').addEventListener('click', () => renderLogin());
  document.getElementById('rv-check-btn').addEventListener('click', async () => {
    const no = document.getElementById('rv-no').value.trim();
    const resEl = document.getElementById('rv-result');
    if (!no){ resEl.innerHTML = '<div class="err">पावती क्रमांक टाका.</div>'; return; }
    resEl.innerHTML = '<div class="empty">तपासत आहे...</div>';
    try {
      const { data, error } = await sb.rpc('verify_receipt', { p_receipt_no: no });
      if (error) throw error;
      if (!data || !data.length){
        resEl.innerHTML = '<div class="err">✗ ही पावती सापडली नाही — बनावट असू शकते.</div>';
        return;
      }
      const r = data[0];
      resEl.innerHTML = `
        <div class="ok" style="font-size:14px;">
          ✓ ही पावती खरी आहे.<br>
          <b>सभासद:</b> ${r.member_name}<br>
          <b>रक्कम:</b> ${fmtMoney(r.amount)}<br>
          <b>दिनांक:</b> ${new Date(r.issued_at).toLocaleDateString('en-IN')}
        </div>`;
    } catch(e){ resEl.innerHTML = '<div class="err">त्रुटी: ' + e.message + '</div>'; }
  });
}

async function findMemberByMobile(){
  const btn = document.getElementById('li-find-btn');
  const mobile = document.getElementById('li-mobile').value.trim();
  if (!mobile || mobile.length < 10){ renderLogin('कृपया बरोबर १० अंकी मोबाईल क्रमांक टाका.'); return; }
  btn.disabled = true; btn.textContent = 'शोधत आहे...';
  const { data, error } = await sb.rpc('find_members_by_mobile', { p_mobile: mobile });
  if (error || !data || !data.length){
    renderLogin('या मोबाईल क्रमांकावर नोंदणीकृत सभासद सापडला नाही. आधी नोंदणी केली आहे का तपासा, किंवा खाली नोंदणी करा.');
    return;
  }
  if (data.length === 1){ renderPinStep(data[0]); return; }
  // एकाच मोबाईलवर अनेक सभासद — निवडायला द्या
  c.innerHTML = `
    <div class="card">
      <h2 style="text-align:center;margin-top:0;">कोणते सभासद?</h2>
      <p style="font-size:12.5px;color:#777;text-align:center;">या मोबाईल क्रमांकावर एकापेक्षा जास्त सभासद नोंदणीकृत आहेत — तुमचं नाव निवडा.</p>
      ${data.map(m => `<button class="btn ghost" style="margin-bottom:8px;" data-id="${m.id}" data-no="${m.member_no}" data-name="${m.name}">${m.name} (सभासद क्र: ${m.member_no})</button>`).join('')}
    </div>
    <button class="link-btn" id="go-back">‹ मागे</button>
  `;
  document.querySelectorAll('button[data-id]').forEach(b => b.addEventListener('click', () => {
    renderPinStep({ id:b.dataset.id, member_no:b.dataset.no, name:b.dataset.name });
  }));
  document.getElementById('go-back').addEventListener('click', () => renderLogin());
}

function renderPinStep(member){
  c.innerHTML = `
    <div class="card">
      <h2 style="text-align:center;margin-top:0;">नमस्कार, ${member.name}</h2>
      <div class="field"><label>PIN</label><input id="li-pin" type="password" inputmode="numeric" maxlength="6" placeholder="4-6 अंकी PIN" autofocus></div>
      <button class="btn" id="li-btn">लॉगिन करा</button>
      <div class="err" id="li-pin-err"></div>
    </div>
    <button class="link-btn" id="go-back">‹ मागे</button>
  `;
  document.getElementById('go-back').addEventListener('click', () => renderLogin());
  document.getElementById('li-btn').addEventListener('click', () => doLogin(member));
}

async function doLogin(member){
  const btn = document.getElementById('li-btn');
  const errEl = document.getElementById('li-pin-err');
  const pin = document.getElementById('li-pin').value.trim();
  if (!pin){ errEl.textContent = 'PIN टाका.'; return; }
  btn.disabled = true; btn.textContent = 'तपासत आहे...';
  const { data, error } = await sb.auth.signInWithPassword({ email: synthEmail(member.member_no), password: pin });
  if (error){ errEl.textContent = 'चुकीचा PIN.'; btn.disabled=false; btn.textContent='लॉगिन करा'; return; }
  await loadMemberAndShowDashboard();
}

/* ---------- नोंदणी — पायरी १: सभासद क्र + मोबाईल पडताळणी ---------- */
/* ---------- EMI कॅल्क्युलेटर — लॉगिनशिवाय, कोणालाही वापरता येईल ---------- */
function renderEmiCalculator(){
  c.innerHTML = `
    <div class="card">
      <h2 style="text-align:center;margin-top:0;">🧮 EMI कॅल्क्युलेटर</h2>
      <p style="font-size:12.5px;color:#777;text-align:center;">कर्ज घेण्यापूर्वी अंदाजे मासिक हप्ता (EMI) किती येईल ते बघा.</p>
      <div class="field"><label>कर्ज रक्कम (₹)</label><input id="emi-amt" type="number" placeholder="उदा. 100000"></div>
      <div class="field"><label>व्याजदर (वार्षिक %)</label><input id="emi-rate" type="number" step="0.1" placeholder="उदा. 10"></div>
      <div class="field"><label>मुदत (महिने)</label><input id="emi-months" type="number" placeholder="उदा. 36"></div>
      <button class="btn gold" id="emi-calc-btn">EMI काढा</button>
      <div id="emi-result" style="margin-top:16px;"></div>
    </div>
    <button class="link-btn" id="go-back-login">‹ लॉगिनकडे परत</button>
  `;
  document.getElementById('go-back-login').addEventListener('click', () => renderLogin());
  document.getElementById('emi-calc-btn').addEventListener('click', () => {
    const P = Number(document.getElementById('emi-amt').value);
    const annualRate = Number(document.getElementById('emi-rate').value);
    const n = Number(document.getElementById('emi-months').value);
    const resEl = document.getElementById('emi-result');
    if (!P || !annualRate || !n || P<=0 || annualRate<=0 || n<=0){
      resEl.innerHTML = '<div class="err">कृपया तिन्ही रकाने बरोबर भरा.</div>';
      return;
    }
    const r = annualRate / 12 / 100; // मासिक व्याजदर
    const emi = (P * r * Math.pow(1+r, n)) / (Math.pow(1+r, n) - 1);
    const totalPayment = emi * n;
    const totalInterest = totalPayment - P;
    resEl.innerHTML = `
      <div style="background:var(--cream);border-radius:8px;padding:16px;text-align:center;">
        <div style="font-size:12px;color:#777;">मासिक हप्ता (EMI)</div>
        <div style="font-size:26px;font-weight:700;color:var(--navy);">${fmtMoney(emi)}</div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:12px;font-size:13px;">
        <div>एकूण व्याज: <b>${fmtMoney(totalInterest)}</b></div>
        <div>एकूण परतफेड: <b>${fmtMoney(totalPayment)}</b></div>
      </div>
      <p style="font-size:11px;color:#999;margin-top:10px;">* हा फक्त अंदाजे आकडा आहे (reducing-balance पद्धत) — प्रत्यक्ष EMI शाखेतून मंजूर होणाऱ्या अटींनुसार थोडा वेगळा असू शकतो.</p>
    `;
  });
}

/* ---------- व्याजदर पारदर्शकता पान — लॉगिनशिवाय, सार्वजनिक ---------- */
async function renderInterestRates(){
  c.innerHTML = '<div class="empty">लोड होत आहे...</div>';
  try {
    const { data: schemes } = await sb.from('schemes').select('name,interest_rate,product_type').order('product_type');
    const grouped = {};
    (schemes||[]).forEach(s => { (grouped[s.product_type||'इतर'] = grouped[s.product_type||'इतर']||[]).push(s); });
    const sectionHtml = Object.entries(grouped).map(([type, list]) => `
      <div style="margin-top:14px;">
        <div style="font-weight:600;font-size:13.5px;color:var(--navy);margin-bottom:6px;">${type}</div>
        ${list.map(s => `<div class="acc-row"><div>${s.name}</div><div class="bal">${s.interest_rate ? s.interest_rate+'%' : '-'}</div></div>`).join('')}
      </div>
    `).join('');
    c.innerHTML = `
      <div class="card">
        <h2 style="text-align:center;margin-top:0;">📋 सध्याचे व्याजदर</h2>
        ${sectionHtml || '<div class="empty">व्याजदर सध्या उपलब्ध नाहीत.</div>'}
        <p style="font-size:11px;color:#999;margin-top:14px;">* दर बदलू शकतात — अद्ययावत माहितीसाठी शाखेशी संपर्क साधा.</p>
      </div>
      <button class="link-btn" id="go-back-login">‹ लॉगिनकडे परत</button>
    `;
    document.getElementById('go-back-login').addEventListener('click', () => renderLogin());
  } catch(e){
    c.innerHTML = `<div class="card"><div class="err">व्याजदर आणताना त्रुटी: ${e.message}</div></div><button class="link-btn" id="go-back-login">‹ लॉगिनकडे परत</button>`;
    document.getElementById('go-back-login').addEventListener('click', () => renderLogin());
  }
}

function renderRegisterStep1(err){
  c.innerHTML = `
    <div class="card">
      <h2 style="text-align:center;margin-top:0;">नवीन नोंदणी</h2>

/* ---------- नोंदणी — पायरी २: PIN ठरवणे ---------- */
function renderRegisterStep2(member){
  c.innerHTML = `
    <div class="card">
      <h2 style="text-align:center;margin-top:0;">नमस्कार, ${member.name}</h2>
      <p style="font-size:12.5px;color:#777;text-align:center;">आता स्वतःसाठी एक PIN ठरवा (पुढच्या वेळी लॉगिनसाठी वापराल).</p>
      <div class="field"><label>नवीन PIN (4-6 अंकी)</label><input id="rg-pin1" type="password" inputmode="numeric" maxlength="6"></div>
      <div class="field"><label>PIN पुन्हा टाका</label><input id="rg-pin2" type="password" inputmode="numeric" maxlength="6"></div>
      <button class="btn gold" id="rg-final-btn">नोंदणी पूर्ण करा</button>
      <div class="err" id="rg-err"></div>
    </div>
  `;
  document.getElementById('rg-final-btn').addEventListener('click', async () => {
    const btn = document.getElementById('rg-final-btn');
    const errEl = document.getElementById('rg-err');
    const pin1 = document.getElementById('rg-pin1').value.trim();
    const pin2 = document.getElementById('rg-pin2').value.trim();
    if (pin1.length < 4 || pin1.length > 6 || !/^\d+$/.test(pin1)){ errEl.textContent = 'PIN फक्त 4-6 अंकी असावा.'; return; }
    if (pin1 !== pin2){ errEl.textContent = 'दोन्ही PIN जुळत नाहीत.'; return; }
    btn.disabled = true; btn.textContent = 'नोंदणी होत आहे...';
    const { data: signUpData, error: signUpErr } = await sb.auth.signUp({ email: synthEmail(member.member_no), password: pin1 });
    if (signUpErr){ errEl.textContent = 'नोंदणी अयशस्वी: ' + signUpErr.message; btn.disabled=false; btn.textContent='नोंदणी पूर्ण करा'; return; }
    // signUp नंतर लगेच सेशन मिळत नसेल (email confirmation चालू असल्यास) — म्हणून लगेच साइन-इन करून बघतो
    let session = signUpData.session;
    if (!session){
      const { data: signInData } = await sb.auth.signInWithPassword({ email: synthEmail(member.member_no), password: pin1 });
      session = signInData?.session;
    }
    if (!session){
      errEl.innerHTML = 'खातं तयार झालं, पण लगेच लॉगिन होऊ शकलं नाही — Supabase Dashboard → Authentication → Settings मध्ये "Confirm email" पर्याय बंद आहे का तपासा.';
      btn.disabled=false; btn.textContent='नोंदणी पूर्ण करा';
      return;
    }
    const { error: updErr } = await sb.from('members').update({ auth_user_id: session.user.id }).eq('id', member.id);
    if (updErr){ errEl.textContent = 'खातं तयार झालं, पण सभासदाशी जोडताना त्रुटी: ' + updErr.message; btn.disabled=false; btn.textContent='नोंदणी पूर्ण करा'; return; }
    await loadMemberAndShowDashboard();
  });
}

async function loadMemberAndShowDashboard(){

document.getElementById('tabbar').addEventListener('click', (e) => {

});

/* ---------- कॅमेरा QR स्कॅनर ---------- */
let scannerStream = null, scannerLoopId = null;
async function startQrScanner(){
  const box = document.getElementById('scanner-box');
  const video = document.getElementById('scanner-video');
  const canvas = document.getElementById('scanner-canvas');
  const errEl = document.getElementById('sm-err');
  errEl.textContent = '';
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    errEl.textContent = 'हा ब्राउझर/पान कॅमेरा वापरण्यास सक्षम नाही (हे पान https:// वरून उघडलेलं आहे का तपासा — file:// वरून कॅमेरा चालत नाही).';
    return;
  }
  try {
    scannerStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  } catch(e){
    errEl.textContent = 'कॅमेरा उघडता आला नाही: ' + e.message + ' (परवानगी दिली आहे का तपासा)';
    return;
  }
  video.srcObject = scannerStream;
  video.play();
  box.classList.remove('hidden');
  document.getElementById('scanner-cancel').onclick = stopQrScanner;
  const ctx = canvas.getContext('2d');
  const tick = () => {
    if (!scannerStream) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA){
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height);
      if (code && code.data){
        document.getElementById('sm-to').value = code.data.trim();
        stopQrScanner();
        return;
      }
    }
    scannerLoopId = requestAnimationFrame(tick);
  };
  scannerLoopId = requestAnimationFrame(tick);
}
function stopQrScanner(){
  if (scannerLoopId) cancelAnimationFrame(scannerLoopId);
  scannerLoopId = null;
  if (scannerStream){ scannerStream.getTracks().forEach(t => t.stop()); scannerStream = null; }
  const box = document.getElementById('scanner-box');
  if (box) box.classList.add('hidden');
}

  const STATUS_LABEL = { active:'✅ सक्रिय', paused:'⏸ थांबवलेली', cancelled:'❌ रद्द' };
  const rows = (instructions||[]).map(si => `
    <div class="acc-row" style="flex-direction:column;align-items:flex-start;">
      <div style="display:flex;justify-content:space-between;width:100%;">
        <div><b>${fmtMoney(si.amount)}</b> → ${si.to_account_no} (${si.frequency==='monthly'?'दर महिन्याला तारीख '+si.day_of_month:'साप्ताहिक'})</div>
        <div>${STATUS_LABEL[si.status]||si.status}</div>
      </div>
      <div style="font-size:11px;color:#999;">${si.narration||''} ${si.last_executed ? '· शेवटचं कार्यान्वयन: '+si.last_executed : ''}</div>
      ${si.status==='active' ? `<button class="link-btn" style="margin:4px 0 0;font-size:11px;" onclick="cancelStandingInstruction('${si.id}')">रद्द करा</button>` : ''}
    </div>`).join('');

  c.innerHTML = `
    <div class="card">
      <h2 style="text-align:center;margin-top:0;">🔁 स्थायी सूचना</h2>
      <p style="font-size:11px;color:#999;text-align:center;">⚠ सध्या ही सूचना दर महिन्याला शाखेकडून मॅन्युअली कार्यान्वित केली जाईल — पूर्ण आपोआप (automatic) सुविधा भविष्यात येईल.</p>
      ${!accounts || !accounts.length ? '<div class="empty">यासाठी योग्य सक्रिय खातं सापडलं नाही.</div>' : `
        <div class="field"><label>कोणत्या खात्यातून</label><select id="si-from">${accOpts}</select></div>
        <div class="field"><label>कोणत्या खाते क्रमांकात</label><input id="si-to" placeholder="उदा. 290-51"></div>
        <div class="field"><label>रक्कम</label><input id="si-amount" type="number" placeholder="0"></div>
        <div class="field"><label>दर महिन्याला कोणत्या तारखेला (1-28)</label><input id="si-day" type="number" min="1" max="28" placeholder="उदा. 5"></div>
        <div class="field"><label>तपशील (ऐच्छिक)</label><input id="si-narration" placeholder="उदा. RD मध्ये बचत"></div>
        <button class="btn gold" id="si-submit-btn">सूचना नोंदवा</button>
      `}
      <div class="err" id="si-err"></div>
      <div class="ok" id="si-ok"></div>
    </div>
    <div class="card">
      <h3 style="margin-top:0;font-size:15px;">माझ्या सूचना</h3>
      ${rows || '<div class="empty">अजून कुठलीही सूचना नोंदवलेली नाही.</div>'}
    </div>
  `;
  const btn = document.getElementById('si-submit-btn');
  if (btn) btn.addEventListener('click', async () => {
    const errEl = document.getElementById('si-err'), okEl = document.getElementById('si-ok');
    errEl.textContent=''; okEl.textContent='';
    const fromId = document.getElementById('si-from').value;
    const toNo = document.getElementById('si-to').value.trim();
    const amount = Number(document.getElementById('si-amount').value);
    const day = Number(document.getElementById('si-day').value);
    const narration = document.getElementById('si-narration').value.trim();
    if (!toNo || !amount || amount<=0 || !day || day<1 || day>28){ errEl.textContent = 'सगळे रकाने बरोबर भरा (तारीख 1-28 दरम्यान).'; return; }
    btn.disabled = true; btn.textContent = 'नोंदवत आहे...';
    const { error } = await sb.from('standing_instructions').insert({
      member_id: CURRENT_MEMBER.id, from_account_id: fromId, to_account_no: toNo,
      amount, frequency: 'monthly', day_of_month: day, narration: narration||null,
    });
    btn.disabled = false; btn.textContent = 'सूचना नोंदवा';
    if (error){ errEl.textContent = 'त्रुटी: ' + error.message; return; }
    okEl.textContent = '✓ सूचना नोंदवली गेली.';
    setTimeout(() => renderStandingInstructions(), 1000);
  });
}

async function cancelStandingInstruction(id){
  if (!confirm('खरंच ही सूचना रद्द करायची आहे का?')) return;
  await sb.from('standing_instructions').update({ status:'cancelled' }).eq('id', id);
  renderStandingInstructions();
}

async function renderGrievance(){
  c.innerHTML = '<div class="empty">लोड होत आहे...</div>';
  const { data: myGrievances } = await sb.from('grievances')
    .select('id,subject,description,status,created_at,response').eq('member_id', CURRENT_MEMBER.id).order('created_at',{ascending:false});
  const STATUS_LABEL = { open:'⏳ नोंदवली', in_progress:'🔧 प्रक्रियेत', resolved:'✅ सोडवली' };
  const pastRows = (myGrievances||[]).map(g => `
    <div class="acc-row" style="flex-direction:column;align-items:flex-start;">
      <div style="display:flex;justify-content:space-between;width:100%;">
        <div><b>${g.subject}</b></div><div>${STATUS_LABEL[g.status]||g.status}</div>
      </div>
      <div style="font-size:12px;color:#777;">${g.description||''}</div>
      <div style="font-size:11px;color:#999;">${new Date(g.created_at).toLocaleDateString('en-IN')}</div>
      ${g.response ? `<div style="font-size:12px;color:var(--green);margin-top:4px;">उत्तर: ${g.response}</div>` : ''}
    </div>`).join('');
  c.innerHTML = `
    <div class="card">
      <h2 style="text-align:center;margin-top:0;">💬 तक्रार/सूचना</h2>
      <div class="field"><label>विषय</label><input id="gr-subject" placeholder="उदा. व्याज चुकीचं लागलं"></div>
      <div class="field"><label>तपशील</label><input id="gr-desc" placeholder="सविस्तर सांगा"></div>
      <button class="btn gold" id="gr-submit-btn">तक्रार नोंदवा</button>
      <div class="err" id="gr-err"></div>
      <div class="ok" id="gr-ok"></div>
    </div>
    <div class="card">
      <h3 style="margin-top:0;font-size:15px;">माझ्या आधीच्या तक्रारी</h3>
      ${pastRows || '<div class="empty">अजून कुठलीही तक्रार नोंदवलेली नाही.</div>'}
    </div>
  `;
  document.getElementById('gr-submit-btn').addEventListener('click', async () => {
    const errEl = document.getElementById('gr-err'), okEl = document.getElementById('gr-ok');
    errEl.textContent=''; okEl.textContent='';
    const subject = document.getElementById('gr-subject').value.trim();
    const desc = document.getElementById('gr-desc').value.trim();
    if (!subject){ errEl.textContent = 'विषय टाका.'; return; }
    const btn = document.getElementById('gr-submit-btn');
    btn.disabled = true; btn.textContent = 'नोंदवत आहे...';
    const { error } = await sb.from('grievances').insert({ member_id: CURRENT_MEMBER.id, subject, description: desc||null });
    btn.disabled = false; btn.textContent = 'तक्रार नोंदवा';
    if (error){ errEl.textContent = 'त्रुटी: ' + error.message; return; }
    okEl.textContent = '✓ तक्रार नोंदवली गेली.';
    setTimeout(() => renderGrievance(), 1000);
  });
}

async function renderLoanApplication(){
  c.innerHTML = '<div class="empty">लोड होत आहे...</div>';
  const { data: myApps } = await sb.from('loan_applications')
    .select('id,amount,purpose,tenure_months,status,applied_at,review_note')
    .eq('member_id', CURRENT_MEMBER.id).order('applied_at', { ascending:false });

  const STATUS_LABEL = { pending:'⏳ प्रलंबित', approved:'✅ मंजूर', rejected:'❌ नामंजूर' };
  const pastRows = (myApps||[]).map(a => `
    <div class="acc-row" style="flex-direction:column;align-items:flex-start;">
      <div style="display:flex;justify-content:space-between;width:100%;">
        <div><b>${fmtMoney(a.amount)}</b> — ${a.purpose||'-'}</div>
        <div>${STATUS_LABEL[a.status]||a.status}</div>
      </div>
      <div style="font-size:11px;color:#999;">${new Date(a.applied_at).toLocaleDateString('en-IN')} · ${a.tenure_months||'-'} महिने</div>
      ${a.review_note ? `<div style="font-size:11px;color:#777;margin-top:2px;">टीप: ${a.review_note}</div>` : ''}
    </div>`).join('');

  c.innerHTML = `
    <div class="card">
      <h2 style="text-align:center;margin-top:0;">📝 कर्ज मागणी अर्ज</h2>
      <div class="field"><label>हवी असलेली रक्कम (₹)</label><input id="la-amount" type="number" placeholder="उदा. 100000"></div>
      <div class="field"><label>हेतू</label><input id="la-purpose" placeholder="उदा. घर दुरुस्ती"></div>
      <div class="field"><label>हवी असलेली मुदत (महिने)</label><input id="la-tenure" type="number" placeholder="उदा. 36"></div>
      <button class="btn gold" id="la-submit-btn">अर्ज सादर करा</button>
      <div class="err" id="la-err"></div>
      <div class="ok" id="la-ok"></div>
    </div>
    <div class="card">
      <h3 style="margin-top:0;font-size:15px;">माझे आधीचे अर्ज</h3>
      ${pastRows || '<div class="empty">अजून कुठलाही अर्ज केलेला नाही.</div>'}
    </div>
  `;
  document.getElementById('la-submit-btn').addEventListener('click', async () => {
    const errEl = document.getElementById('la-err'), okEl = document.getElementById('la-ok');
    errEl.textContent = ''; okEl.textContent = '';
    const amount = Number(document.getElementById('la-amount').value);
    const purpose = document.getElementById('la-purpose').value.trim();
    const tenure = Number(document.getElementById('la-tenure').value);
    if (!amount || amount <= 0){ errEl.textContent = 'बरोबर रक्कम टाका.'; return; }
    const btn = document.getElementById('la-submit-btn');
    btn.disabled = true; btn.textContent = 'सादर करत आहे...';
    const { error } = await sb.from('loan_applications')
      .insert({ member_id: CURRENT_MEMBER.id, amount, purpose: purpose||null, tenure_months: tenure||null });
    btn.disabled = false; btn.textContent = 'अर्ज सादर करा';
    if (error){ errEl.textContent = 'त्रुटी: ' + error.message; return; }
    okEl.textContent = '✓ अर्ज यशस्वीरित्या सादर झाला — शाखेकडून संपर्क केला जाईल.';
    setTimeout(() => renderLoanApplication(), 1200);
  });
}

async function renderCashDepositRequest(){
  c.innerHTML = '<div class="empty">लोड होत आहे...</div>';
  const { data: accounts } = await sb.from('accounts')
    .select('id,account_no,product_type,status').eq('member_id', CURRENT_MEMBER.id).eq('status','active').in('product_type',['savings','pigmy']);
  const opts = (accounts||[]).map(a => `<option value="${a.id}">${a.account_no} (${a.product_type})</option>`).join('');
  c.innerHTML = `
    <div class="card">
      <h2 style="text-align:center;margin-top:0;">💵 कॅश डिपॉझिट</h2>
      <p style="font-size:12.5px;color:#777;text-align:center;">रक्कम व खातं निवडा — एक OTP मिळेल, तो कॅश-काउंटरवर सांगून पैसे जमा करा.</p>
      ${!accounts || !accounts.length ? '<div class="empty">डिपॉझिटसाठी योग्य (बचत/पिग्मी) सक्रिय खातं सापडलं नाही.</div>' : `
        <div class="field"><label>कोणत्या खात्यात</label><select id="cd-account">${opts}</select></div>
        <div class="field"><label>रक्कम</label><input id="cd-amount" type="number" placeholder="0"></div>
        <button class="btn gold" id="cd-request-btn">OTP मिळवा</button>
      `}
      <div class="err" id="cd-err"></div>
      <div id="cd-otp-box"></div>
    </div>
  `;
  const btn = document.getElementById('cd-request-btn');
  if (btn) btn.addEventListener('click', async () => {
    const errEl = document.getElementById('cd-err');
    errEl.textContent = '';
    const accountId = document.getElementById('cd-account').value;
    const amount = Number(document.getElementById('cd-amount').value);
    if (!amount || amount <= 0){ errEl.textContent = 'बरोबर रक्कम टाका.'; return; }
    btn.disabled = true; btn.textContent = 'तयार करत आहे...';
    const otp = String(Math.floor(100000 + Math.random()*900000));
    const { data, error } = await sb.from('cash_deposit_requests')
      .insert({ account_id: accountId, member_id: CURRENT_MEMBER.id, amount, otp })
      .select('id').single();
    btn.disabled = false; btn.textContent = 'OTP मिळवा';
    if (error){ errEl.textContent = 'त्रुटी: ' + error.message; return; }
    document.getElementById('cd-otp-box').innerHTML = `
      <div style="background:var(--cream);border-radius:8px;padding:18px;text-align:center;margin-top:14px;">
        <div style="font-size:12px;color:#777;">हा OTP कॅश-काउंटरवर सांगा</div>
        <div style="font-size:32px;font-weight:700;color:var(--navy);letter-spacing:4px;">${otp}</div>
        <div style="font-size:12px;color:#777;margin-top:6px;">रक्कम: ${fmtMoney(amount)}</div>
      </div>
      <p style="font-size:11px;color:#999;margin-top:10px;text-align:center;">काउंटरवर पैसे मोजून OTP सांगितल्यावरच खात्यात जमा होईल.</p>
    `;
  });
}

async function renderMyQR(){
  if (!CURRENT_MEMBER){ await loadMemberAndShowDashboard(); return; }
  c.innerHTML = '<div class="empty">लोड होत आहे...</div>';
  const { data: accounts } = await sb.from('accounts')
    .select('account_no,product_type,status').eq('member_id', CURRENT_MEMBER.id).eq('status','active').eq('product_type','savings').limit(1);
  const acc = (accounts||[])[0];
  if (!acc){ c.innerHTML = '<div class="card"><div class="empty">QR दाखवण्यासाठी सक्रिय बचत खातं सापडलं नाही.</div></div>'; return; }
  c.innerHTML = `
    <div class="card" style="text-align:center;">
      <h2 style="margin-top:0;">माझा पेमेंट QR</h2>
      <div style="font-size:13px;color:#777;margin-bottom:14px;">हा QR इतर कोणालाही दाखवा — ते "पैसे पाठवा" मधून स्कॅन करून तुम्हाला थेट पैसे पाठवू शकतील.</div>
      <div id="qr-box" style="display:flex;justify-content:center;margin:14px 0;"></div>
      <div style="font-size:20px;font-weight:700;color:var(--navy);">${acc.account_no}</div>
      <div style="font-size:12px;color:#8a8676;">${CURRENT_MEMBER.name}</div>
    </div>
  `;
  new QRCode(document.getElementById('qr-box'), { text: acc.account_no, width:200, height:200, colorDark:'#1B2A4A', colorLight:'#ffffff' });
}

/* ---------- सुरुवात ---------- */
async function bootstrap(){
  const { data: { session } } = await sb.auth.getSession();
  if (session){ await loadMemberAndShowDashboard(); }
  else { CURRENT_MEMBER = null; logoutBtn.classList.add('hidden'); document.getElementById('tabbar').classList.add('hidden'); renderLogin(); }
}
window.addEventListener('pageshow', (e) => { if (e.persisted) bootstrap(); }); // ब्राउझर bfcache मधून पान परत आलं तर ताजी तपासणी
bootstrap();
</script>
